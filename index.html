<script>
// 🔧 REMPLIR avec l'URL de votre déploiement Apps Script
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzu4TSUVdgvITXEvUMT2FFdZYDhKIlBjrzVX046EsE-J0Wt9I_g7J7SStFN5hFDYCU_2Q/exec";

// ✅ SÉCURISÉ — hash SHA-256 du token (jamais le secret en clair)
const SECRET = "34f54f134f153ee1c638db15567e52f7b9ff469bf24a533eeec1346648c8cdfe";

// ── Utilitaire SHA-256 (Web Crypto API) ──────────────────────────────────────
async function sha256(str){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// ── #4 — Sanitisation des champs texte libres ─────────────────────────────────
// React échappe déjà le JSX, mais on nettoie en amont pour les logs et exports
function sanitize(str,maxLen=500){
  if(!str||typeof str!=="string")return"";
  return str
    .replace(/[<>]/g,"") // supprimer balises HTML résiduelles
    .replace(/javascript:/gi,"") // supprimer protocoles dangereux
    .replace(/on\w+\s*=/gi,"")   // supprimer event handlers inline
    .trim()
    .slice(0,maxLen);
}
function uuid(prefix=""){
  if(typeof crypto.randomUUID==="function")
    return prefix+crypto.randomUUID().replace(/-/g,"").slice(0,16);
  const arr=new Uint8Array(8);crypto.getRandomValues(arr);
  return prefix+Array.from(arr).map(b=>b.toString(16).padStart(2,"0")).join("");
}

// ── Hash SHA-256 du mot de passe admin (jamais en clair dans le code) ────────
const ADMIN_HASH="6d27953b5ffe439d4c4e370cb520b03f0ca22af1837b702bcf459ef03d692f1a";

// ── localStorage — cache local immédiat, toujours disponible ─────────────────
// #4 — Chiffrement AES-GCM des données sensibles dans localStorage
// Clé dérivée d'un secret fixe par appareil (device fingerprint léger)
// Note : ne protège pas contre un attaquant avec accès OS, mais bloque
// la lecture depuis DevTools ou un autre profil navigateur
const _lsEncKey=(async()=>{
  const raw=new TextEncoder().encode("fp_local_v1_"+navigator.userAgent.slice(0,30));
  const base=await crypto.subtle.importKey("raw",raw,"PBKDF2",false,["deriveKey"]);
  return crypto.subtle.deriveKey(
    {name:"PBKDF2",salt:new TextEncoder().encode("fermapro2026"),iterations:10000,hash:"SHA-256"},
    base,{name:"AES-GCM",length:256},false,["encrypt","decrypt"]
  );
})();

async function lssEnc(k,v){
  try{
    const key=await _lsEncKey;
    const iv=crypto.getRandomValues(new Uint8Array(12));
    const data=new TextEncoder().encode(JSON.stringify(v));
    const enc=await crypto.subtle.encrypt({name:"AES-GCM",iv},key,data);
    const payload={iv:Array.from(iv),enc:Array.from(new Uint8Array(enc))};
    localStorage.setItem(k,JSON.stringify({_fp_enc:1,...payload}));
  }catch(e){
    // Fallback non chiffré si SubtleCrypto indisponible
    try{localStorage.setItem(k,JSON.stringify(v));}catch{}
  }
}
async function lsgDec(k){
  try{
    const raw=localStorage.getItem(k);
    if(!raw)return null;
    const parsed=JSON.parse(raw);
    if(!parsed._fp_enc) return parsed; // données non chiffrées (migration)
    const key=await _lsEncKey;
    const iv=new Uint8Array(parsed.iv);
    const enc=new Uint8Array(parsed.enc);
    const dec=await crypto.subtle.decrypt({name:"AES-GCM",iv},key,enc);
    return JSON.parse(new TextDecoder().decode(dec));
  }catch{return null;}
}

// Versions synchrones pour compatibilité (non chiffrées — pour les clés non sensibles)
function lsg(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}}
function lss(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
// Versions chiffrées pour les données sensibles (heures, employés)
async function lsgS(k){return await lsgDec(k)||lsg(k);}
async function lssS(k,v){await lssEnc(k,v);}
// ── Indicateur connexion ──────────────────────────────────────────────────────
const GS_READY = SCRIPT_URL && SCRIPT_URL !== "VOTRE_APPS_SCRIPT_URL";

// ── Lecture depuis Apps Script (#1 — POST pour éviter secret dans URL) ────────
async function sg(k){
  if(GS_READY){
    try{
      const ctrl=new AbortController();
      const tid=setTimeout(()=>ctrl.abort(),8000);
      // #1 — Lecture via POST (secret dans le body, pas dans l'URL)
      const r=await fetch(SCRIPT_URL,{
        method:"POST",
        headers:{"Content-Type":"text/plain"},
        body:JSON.stringify({secret:SECRET,action:"get",key:k}),
        redirect:"follow",
        signal:ctrl.signal
      });
      clearTimeout(tid);
      const j=await r.json();
      if(j.ok && j.data!==null){
        lss(k,j.data);
        return j.data;
      }
    }catch(e){console.warn("sg POST error, using local cache",e);}
  }
  return lsg(k);
}

// ── Écriture vers Apps Script — version fiable avec confirmation ──────────────
async function ss(k,v){
  lss(k,v); // localStorage IMMÉDIAT
  if(!GS_READY)return false;
  try{
    const ctrl=new AbortController();
    const tid=setTimeout(()=>ctrl.abort(),12000);
    const r=await fetch(SCRIPT_URL,{
      method:"POST",
      headers:{"Content-Type":"text/plain"},
      body:JSON.stringify({secret:SECRET,action:"set",key:k,value:v}),
      redirect:"follow",
      signal:ctrl.signal
    });
    clearTimeout(tid);
    const j=await r.json();
    if(j.ok){
      console.log(`✅ Sheets sync OK: ${k}`);
      return true;
    } else {
      console.warn(`❌ Sheets sync erreur: ${k}`,j.error);
      retryQueueAdd(k,v);
      return false;
    }
  }catch(e){
    console.warn(`❌ Sheets sync échoué: ${k}`,e.message);
    retryQueueAdd(k,v);
    return false;
  }
}

// ── Alias compatibilité ───────────────────────────────────────────────────────
function keyToPath(k){return k;}
const FB_READY=GS_READY;
const FS_BASE=null;

// ════════════════════════════════════════════════════════════════════
// R4 — QUEUE DE RETRY PERSISTANTE
// Les writes échoués sont stockés dans localStorage et réessayés
// au prochain chargement de l'app (max 50 entrées, expiration 24h)
// ════════════════════════════════════════════════════════════════════
const RETRY_KEY="fp:retry_queue";
const RETRY_MAX=50;
const RETRY_TTL=86400000; // 24h en ms

function retryQueueAdd(key,value){
  if(!GS_READY)return;
  try{
    const q=lsg(RETRY_KEY)||[];
    const entry={key,value,ts:Date.now(),attempts:0};
    // Dédupliquer : remplacer si même clé déjà en queue
    const filtered=q.filter(e=>e.key!==key);
    const next=[entry,...filtered].slice(0,RETRY_MAX);
    lss(RETRY_KEY,next);
    console.warn(`⚠️ Write échoué mis en queue : ${key} (${next.length} en attente)`);
  }catch(e){}
}

async function retryQueueFlush(){
  if(!GS_READY)return;
  const q=lsg(RETRY_KEY)||[];
  if(!q.length)return;
  const now=Date.now();
  const valid=q.filter(e=>now-e.ts<RETRY_TTL);
  if(!valid.length){lss(RETRY_KEY,[]);return;}
  const failed=[];
  for(const item of valid){
    try{
      const r=await fetch(SCRIPT_URL,{
        method:"POST",headers:{"Content-Type":"text/plain"},
        body:JSON.stringify({secret:SECRET,action:"set",key:item.key,value:item.value}),
        redirect:"follow"
      });
      const j=await r.json();
      if(!j.ok)throw new Error(j.error);
      console.log(`✅ Retry réussi : ${item.key}`);
    }catch(e){
      console.warn(`❌ Retry échoué : ${item.key}`,e);
      failed.push({...item,attempts:(item.attempts||0)+1});
    }
  }
  lss(RETRY_KEY,failed.filter(e=>e.attempts<5)); // abandon après 5 tentatives
  if(failed.length===0&&valid.length>0)
    console.log(`✅ Queue retry vidée (${valid.length} write(s) synchronisé(s))`);
}

// ════════════════════════════════════════════════════════════════════
// R3 — SAFESAVE avec merge par TIMESTAMP (updatedAt)
// Résolution de conflits : version la plus récente gagne
// Tombstones : les entrées supprimées sont marquées deleted:true
//   → propagation fiable des suppressions entre appareils
// ════════════════════════════════════════════════════════════════════
async function safeSave(key,newEntries,onSyncError){
  lss(key,newEntries); // localStorage immédiat
  if(!GS_READY){retryQueueAdd(key,newEntries);return false;}
  try{
    // Lire Sheets
    const r1=await fetch(SCRIPT_URL,{
      method:"POST",headers:{"Content-Type":"text/plain"},
      body:JSON.stringify({secret:SECRET,action:"get",key}),
      redirect:"follow"
    });
    const j=await r1.json();
    const remote=(j.ok&&Array.isArray(j.data))?j.data:[];

    // Merge : local gagne sur les entrées modifiées récemment (< 60s)
    // Sheets gagne sur tout le reste (source de vérité)
    const remoteMap=new Map(remote.map(e=>[e.id,e]));
    const localMap=new Map(newEntries.map(e=>[e.id,e]));
    const allIds=new Set([...remoteMap.keys(),...localMap.keys()]);
    const now60s=Date.now()-60000;

    const merged=[];
    allIds.forEach(id=>{
      const loc=localMap.get(id);
      const rem=remoteMap.get(id);
      if(loc&&rem){
        const locTs=loc.updatedAt||0;
        // Local gagne si : modif fraîche (< 60s) OU tombstone (suppression)
        if((locTs>now60s)||loc.deleted) merged.push(loc);
        else merged.push(rem);
      } else if(loc){
        merged.push(loc); // nouvelle entrée locale
      } else if(rem&&!localMap.has(rem.id)){
        // Entrée Sheets absente du local → la conserver SAUF si elle a été supprimée localement
        // On vérifie que ce n'est pas une entrée qu'on vient de supprimer
        const wasDeleted=newEntries.find(e=>e.id===rem.id&&e.deleted);
        if(!wasDeleted) merged.push(rem);
      }
    });

    const now=Date.now();
    const TTL_DELETED=7*86400000;
    const final=merged
      .filter(e=>!e.deleted||(now-(e.deletedAt||0)<TTL_DELETED))
      .sort((a,b)=>(a.date||a.dateStart||"").localeCompare(b.date||b.dateStart||""));

    lss(key,final);

    // Écriture vers Sheets — awaitable pour confirmer
    const r2=await fetch(SCRIPT_URL,{
      method:"POST",headers:{"Content-Type":"text/plain"},
      body:JSON.stringify({secret:SECRET,action:"set",key,value:final}),redirect:"follow"
    });
    const j2=await r2.json();
    if(!j2.ok){
      retryQueueAdd(key,final);
      if(onSyncError)onSyncError();
      return false;
    }
    return true;
  }catch(e){
    console.warn("safeSave error",e);
    retryQueueAdd(key,newEntries);
    if(onSyncError)onSyncError();
    // Fallback : écriture directe sans merge
    fetch(SCRIPT_URL,{
      method:"POST",headers:{"Content-Type":"text/plain"},
      body:JSON.stringify({secret:SECRET,action:"set",key,value:newEntries}),redirect:"follow"
    }).catch(()=>{});
    return false;
  }
}

// ── adminLog — journalisation des actions admin (F3) ─────────────────────────
async function adminLog(action,detail){
  const key="fp:admin:log";
  const existing=await sg(key)||[];
  const entry={id:uuid("log_"),action,detail,at:new Date().toLocaleString("fr-FR")};
  const next=[entry,...existing].slice(0,200);
  ss(key,next);
}

// ── #7+#9 — Monitoring : logs structurés + remontée vers Apps Script ──────────
function logToServer(level, event, data){
  if(!GS_READY)return;
  const entry={ts:new Date().toISOString(),level,event,data:data||{},ua:navigator.userAgent.slice(0,60)};
  fetch(SCRIPT_URL,{
    method:"POST",headers:{"Content-Type":"text/plain"},
    body:JSON.stringify({secret:SECRET,action:"log_error",error:entry}),
    redirect:"follow"
  }).catch(()=>{});
}
window.addEventListener("error",(evt)=>{
  logToServer("ERROR","JS_ERROR",{msg:evt.message,file:evt.filename,line:evt.lineno,col:evt.colno});
});
window.addEventListener("unhandledrejection",(evt)=>{
  logToServer("ERROR","UNHANDLED_REJECTION",{msg:String(evt.reason?.message||evt.reason)});
});

console.log(GS_READY?"✅ Google Sheets Apps Script prêt":"⚠️ Mode local — configurez SCRIPT_URL");
</script>

// ══════════════════════════════════════════════════════════════════════════════
// WEBAUTHN — Authentification biométrique (Empreinte / Face ID)
// ══════════════════════════════════════════════════════════════════════════════

function waSupported(){return!!window.PublicKeyCredential&&!!navigator.credentials;}

function bufToB64(buf){return btoa(String.fromCharCode(...new Uint8Array(buf)));}
function b64ToBuf(b64){
  // URL-safe base64 → standard
  const s=b64.replace(/-/g,"+").replace(/_/g,"/");
  const bin=atob(s);const buf=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++)buf[i]=bin.charCodeAt(i);
  return buf.buffer;
}

// Enregistrement biométrique — à appeler une seule fois par appareil
async function waRegister(empId,empName){
  const challenge=crypto.getRandomValues(new Uint8Array(32));
  const userId=new TextEncoder().encode(empId);
  const cred=await navigator.credentials.create({publicKey:{
    challenge,
    rp:{name:"Fermapro",id:location.hostname},
    user:{id:userId,name:empName,displayName:empName},
    pubKeyCredParams:[{alg:-7,type:"public-key"},{alg:-257,type:"public-key"}],
    authenticatorSelection:{
      authenticatorAttachment:"platform", // biométrie appareil uniquement
      userVerification:"required",
      residentKey:"preferred"
    },
    timeout:60000,
    attestation:"none"
  }});
  return bufToB64(cred.rawId);
}

// Authentification biométrique — retourne true si succès
async function waAuthenticate(credentialIdB64){
  const challenge=crypto.getRandomValues(new Uint8Array(32));
  const assertion=await navigator.credentials.get({publicKey:{
    challenge,
    rpId:location.hostname,
    allowCredentials:[{id:b64ToBuf(credentialIdB64),type:"public-key",transports:["internal"]}],
    userVerification:"required",
    timeout:60000
  }});
  return!!assertion; // pas d'exception = biométrie validée par l'appareil
}

// ── LOGIN SALARIÉ — WebAuthn + fallback PIN ───────────────────────────────────
function EmpLogin({employees,onLogin,onBack,onEmpUpdate}){
  const[step,setStep]=useState("select");
  const[sel,setSel]=useState(null);
  const[pin,setPin]=useState("");
  const[err,setErr]=useState("");
  const[attempts,setAttempts]=useState(0);
  const[locked,setLocked]=useState(false);
  const[bioState,setBioState]=useState("idle"); // idle | scanning | registering | error | unsupported
  const[showPinFallback,setShowPinFallback]=useState(false);

  const hasBio=sel&&sel.credentialId&&waSupported();
  const bioAvail=waSupported();

  // ── Détection appareil pour messages contextuels ────────────────────────────
  const device=(()=>{
    const ua=navigator.userAgent;
    const isIOS=/iPhone|iPad|iPod/.test(ua);
    const isAndroid=/Android/.test(ua);
    const isMac=/Macintosh/.test(ua)&&navigator.maxTouchPoints>1===false;
    const isWin=/Windows/.test(ua);
    if(isIOS)   return{type:"ios",  icon:"📱",label:"iPhone / iPad",  bio:"Face ID ou Touch ID",  hello:null,       tip:"Votre appareil iOS utilisera Face ID ou Touch ID."};
    if(isAndroid)return{type:"android",icon:"📱",label:"Android",    bio:"Empreinte digitale",   hello:null,       tip:"Votre téléphone utilisera le capteur d'empreinte ou le déverrouillage facial."};
    if(isMac)   return{type:"mac",  icon:"💻",label:"Mac",           bio:"Touch ID",             hello:null,       tip:"Utilisez Touch ID sur votre clavier ou trackpad."};
    if(isWin)   return{type:"win",  icon:"🖥",label:"PC Windows",    bio:"Windows Hello",        hello:true,       tip:"Windows Hello s'ouvrira (code PIN Windows, empreinte ou reconnaissance faciale)."};
    return       {type:"other",icon:"🖥",label:"Ordinateur",          bio:"clé de sécurité",      hello:null,       tip:"Votre navigateur vous proposera une méthode d'authentification."};
  })();

  // ── Sélection du collaborateur ──────────────────────────────────────────────
  function selectEmp(emp){
    setSel(emp);setPin("");setErr("");setBioState("idle");setShowPinFallback(false);
    setStep(emp.credentialId&&waSupported()?"bio":"pin");
  }

  // ── Authentification biométrique ────────────────────────────────────────────
  async function doBio(){
    if(!sel.credentialId)return;
    setBioState("scanning");setErr("");
    try{
      const ok=await waAuthenticate(sel.credentialId);
      if(ok){
        setBioState("idle");
        // #4 — Log de connexion
        adminLog("CONNEXION",`${sel.name} — biométrie (${device.label})`);
        onLogin(sel);
      }
      else{setBioState("error");setErr("Authentification refusée.");}
    }catch(e){
      setBioState("error");
      if(e.name==="NotAllowedError")setErr("Accès biométrique refusé ou annulé.");
      else if(e.name==="InvalidStateError")setErr("Identifiant non reconnu sur cet appareil.");
      else setErr("Erreur biométrie : "+e.message);
    }
  }

  // ── Premier enregistrement biométrique ────────────────────────────────────
  async function doRegisterBio(){
    if(!waSupported()){setErr("WebAuthn non supporté sur cet appareil.");return;}
    setBioState("registering");setErr("");
    try{
      const credId=await waRegister(sel.id,sel.name);
      // #7 — Stocker le credentialId en clair dans localStorage (pour auth locale)
      // mais uniquement un hash SHA-256 dans Google Sheets (pas d'exposition biométrique)
      const credHash=await sha256(credId);
      const updated={...sel,credentialId:credId,credentialHash:credHash};
      const allEmps=await sg("fp:employees")||[];
      // Sauvegarder hash seul dans Sheets, credentialId complet en local uniquement
      const forSheets=allEmps.map(e=>e.id===sel.id
        ?{...e,credentialId:"LOCAL_ONLY",credentialHash:credHash}
        :e);
      const forLocal=allEmps.map(e=>e.id===sel.id?updated:e);
      lss("fp:employees",forLocal); // localStorage = credentialId complet
      await ss("fp:employees",forSheets); // Sheets = hash uniquement
      setSel(updated);setBioState("idle");
      setStep("bio");
      adminLog("ENREG_BIO",`${sel.name} — biométrie enregistrée (hash uniquement en Sheets)`);
    }catch(e){
      setBioState("error");
      if(e.name==="NotAllowedError")setErr("Enregistrement annulé.");
      else setErr("Erreur enregistrement : "+e.message);
    }
  }

  // ── Fallback PIN ─────────────────────────────────────────────────────────
  async function doLogin(){
    if(locked)return;
    // #1 — Comparaison SHA-256. Rétrocompat : si PIN encore en clair (4 chiffres), compare direct
    const storedPin=sel.pin||"";
    const match=storedPin.length===4
      ?(pin===storedPin)                  // ancien format non hashé
      :((await sha256(pin))===storedPin); // nouveau format hashé
    if(match){
      setAttempts(0);
      // #4 — Log de connexion
      adminLog("CONNEXION",`${sel.name} — code PIN`);
      onLogin(sel);
    }
    else{
      const next=attempts+1;setAttempts(next);setPin("");
      if(next>=5){
        setLocked(true);setErr("Trop de tentatives. Attendez 30 secondes.");
        setTimeout(()=>{setLocked(false);setAttempts(0);setErr("");},30000);
      } else setErr(`Code PIN incorrect. (${next}/5)`);
    }
  }

  return(
    <div style={{minHeight:"100vh",background:"#F7F9FC"}}>
      <div style={{background:`linear-gradient(135deg,${NAVYDK},${NAVYLT})`,padding:"1rem 1.25rem"}}>
        <div style={{maxWidth:440,margin:"0 auto",display:"flex",alignItems:"center",gap:10}}>
          <button onClick={step==="select"?onBack:()=>{setStep("select");setSel(null);setBioState("idle");setShowPinFallback(false);setErr("");}}
            style={{background:"rgba(255,255,255,0.15)",border:"none",color:"#fff",width:36,height:36,borderRadius:10,cursor:"pointer",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>←</button>
          <div>
            <div style={{color:"#fff",fontWeight:800,fontSize:17}}>Connexion Salarié</div>
            <div style={{color:"rgba(255,255,255,0.55)",fontSize:12}}>
              {step==="select"?"Sélectionnez votre nom":step==="bio"?`Bonjour, ${sel?.name} 👋`:step==="register"?`Configurer la biométrie`:`Code PIN — ${sel?.name}`}
            </div>
          </div>
        </div>
      </div>

      <div style={{padding:"1.5rem",maxWidth:440,margin:"0 auto"}}>

        {/* ── ÉTAPE 1 : Sélection collaborateur ── */}
        {step==="select"&&(
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            <p style={{color:"#718096",fontSize:12,fontWeight:700,margin:"0 0 4px",letterSpacing:0.5}}>QUI ÊTES-VOUS ?</p>
            {employees.filter(e=>!e.archived).map(emp=>(
              <button key={emp.id} onClick={()=>selectEmp(emp)}
                style={{background:"#fff",border:"1.5px solid #E2E8F0",borderRadius:16,padding:"1rem 1.25rem",cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:14}}>
                {emp.photo
                  ?<div style={{width:44,height:44,borderRadius:"50%",overflow:"hidden",flexShrink:0}}><img src={emp.photo} style={{width:"100%",height:"100%",objectFit:"cover"}}/></div>
                  :<Avatar name={emp.name}/>
                }
                <span style={{fontWeight:700,fontSize:16,color:"#1A202C",flex:1}}>{emp.name}</span>
                <span style={{fontSize:15}}>{emp.credentialId&&waSupported()?"🔐":"🔢"}</span>
                <span style={{color:"#CBD5E0",fontSize:20}}>›</span>
              </button>
            ))}
            {bioAvail&&(
              <div style={{background:"#EBF8FF",border:"1px solid #BEE3F8",borderRadius:10,padding:"8px 12px",display:"flex",alignItems:"center",gap:8,marginTop:4}}>
                <span style={{fontSize:16}}>🔐</span>
                <span style={{fontSize:12,color:"#2B6CB0",fontWeight:600}}>Les icônes 🔐 = connexion par empreinte / Face ID activée</span>
              </div>
            )}
          </div>
        )}

        {/* ── ÉTAPE 2a : Authentification biométrique ── */}
        {step==="bio"&&sel&&(
          <Card style={{marginTop:"1rem",textAlign:"center"}}>
            {sel.photo
              ?<div style={{width:72,height:72,borderRadius:"50%",overflow:"hidden",margin:"0 auto 1rem",border:`3px solid ${NAVY}20`}}><img src={sel.photo} style={{width:"100%",height:"100%",objectFit:"cover"}}/></div>

            }

            <p style={{color:"#A0AEC0",fontSize:13,margin:"0 0 1.25rem"}}>Authentification biométrique</p>

            {/* ── Bulle info appareil ── */}
            <div style={{background:`${NAVY}06`,border:`1px solid ${NAVY}12`,borderRadius:12,padding:"8px 12px",marginBottom:"1.25rem",display:"flex",alignItems:"center",gap:10,textAlign:"left"}}>

// ── FORM HEURES ───────────────────────────────────────────────────────────────
function WorkForm({initial,onSave,onCancel,ym}){
  // Calculer min/max du mois sélectionné pour bloquer les dates hors-mois
  const minDate=ym?`${ym}-01`:"";
  const maxDate=ym?(()=>{const[y,m]=ym.split("-").map(Number);const last=new Date(y,m,0).getDate();return `${ym}-${String(last).padStart(2,"0")}`;})():"";
  const[form,setForm]=useState({date:minDate||today(),startTime:"08:00",endTime:"17:00",breakMin:"60",note:"",...initial});
  const h=calcH(form.startTime,form.endTime,form.breakMin);
  const set=k=>v=>setForm(f=>({...f,[k]:v}));
  // Validation : la date doit appartenir au mois sélectionné
  const dateOk=!ym||(!form.date?false:form.date>=minDate&&form.date<=maxDate);
  return(
    <Card style={{marginBottom:"1rem",border:`2px solid ${MAG}30`}}>
      <h3 style={{fontSize:15,fontWeight:800,color:NAVY,margin:"0 0 1.25rem",display:"flex",alignItems:"center",gap:8}}>
        <span style={{background:`${MAG}15`,color:MAG,width:28,height:28,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0}}>{initial?"✏":"⏱"}</span>
        {initial?"Modifier les heures":"Saisir mes heures"}
      </h3>
      <Inp label="Date" type="date" value={form.date}
        min={minDate} max={maxDate}
        onChange={e=>{
          const v=e.target.value;
          // Bloquer silencieusement si hors mois
          if(ym&&v&&(v<minDate||v>maxDate))return;
          set("date")(v);
        }}/>
      {!dateOk&&form.date&&<div style={{background:"#FFF5F5",border:"1.5px solid #FC8181",borderRadius:8,padding:"6px 10px",fontSize:12,color:"#C53030",fontWeight:700,marginBottom:8}}>⚠️ La date doit être en {ym?fmtYM(ym):""}</div>}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <Inp label="Heure début" type="time" value={form.startTime} onChange={e=>set("startTime")(e.target.value)}/>
        <Inp label="Heure fin" type="time" value={form.endTime} onChange={e=>set("endTime")(e.target.value)}/>
      </div>
      <Inp label="Pause (min)" type="number" min="0" max="240" value={form.breakMin} onChange={e=>set("breakMin")(e.target.value)}/>
      <Inp label="Note / Chantier" value={form.note} onChange={e=>set("note")(e.target.value)} placeholder="Optionnel"/>
      {h>0&&<div style={{background:`linear-gradient(135deg,${NAVY}10,${MAG}10)`,borderRadius:12,padding:"0.85rem 1rem",marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"center",border:`1px solid ${MAG}20`}}><span style={{color:"#4A5568",fontSize:14,fontWeight:600}}>⏱ Temps effectif</span><span style={{color:MAG,fontWeight:800,fontSize:20}}>{fmtH(h)}</span></div>}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <Btn variant="outline" onClick={onCancel}>Annuler</Btn>
        <Btn onClick={()=>onSave({...form,type:"work",note:sanitize(form.note,200)})} disabled={!form.date||h<=0||!dateOk}>Enregistrer</Btn>
      </div>
    </Card>
  );
}

function AbsForm({initial,onSave,onCancel,ym}){
  const minDate=ym?`${ym}-01`:"";

  const def={absType:"cp",dateStart:minDate||today(),dateEnd:minDate||today(),halfDay:"full",note:""};
  const[form,setForm]=useState({...def,...(initial&&initial.absType?initial:{})});
  const set=k=>v=>setForm(f=>({...f,[k]:v}));
  const typ=at(form.absType);
  // Validation date dans le mois
  const dateOk=!ym||(!form.dateStart?false:form.dateStart>=minDate&&form.dateStart<=maxDate);
  const dateEndOk=!ym||(!form.dateEnd?true:form.dateEnd>=minDate&&form.dateEnd<=maxDate);
  const handleDate=k=>v=>{
    if(ym&&v&&(v<minDate||v>maxDate))return; // bloquer hors-mois
    set(k)(v);
  };
  const nb=(()=>{
    if(form.halfDay==="half")return 0.5;
    const excludeWE=form.absType!=="mal"&&form.absType!=="accd";
    let count=0;
    let cur=new Date(form.dateStart);
    const end=new Date(form.dateEnd||form.dateStart);
    while(cur<=end){
      const ds=cur.toISOString().slice(0,10);
      const wd=cur.getDay();
      const isWE=wd===0||wd===6;
      if(!excludeWE||(excludeWE&&!isWE&&!isFerie(ds)))count++;
      cur.setDate(cur.getDate()+1);
    }
    return Math.max(1,count);
  })();
  return(
    <Card style={{marginBottom:"1rem",border:`2px solid ${typ.color}40`}}>
      <h3 style={{fontSize:15,fontWeight:800,color:typ.color,margin:"0 0 1.25rem",display:"flex",alignItems:"center",gap:8}}>

        {initial&&initial.absType?"Modifier l'absence":"Déclarer une absence"}
      </h3>
      <div style={{marginBottom:14}}>
        <label style={{display:"block",fontSize:11,fontWeight:700,color:"#4A5568",marginBottom:8,letterSpacing:0.5,textTransform:"uppercase"}}>Type d'absence</label>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          {ABS.map(a=>(
            <button key={a.id} onClick={()=>set("absType")(a.id)} style={{background:form.absType===a.id?a.bg:"#F7F9FC",border:`2px solid ${form.absType===a.id?a.color:"#E2E8F0"}`,borderRadius:12,padding:"0.65rem 0.8rem",cursor:"pointer",display:"flex",alignItems:"center",gap:8,textAlign:"left",transition:"all 0.15s"}}>
              <span style={{fontSize:17,flexShrink:0}}>{a.icon}</span>
              <span style={{fontSize:11,fontWeight:700,color:form.absType===a.id?a.color:"#4A5568",lineHeight:1.3}}>{a.label}</span>
            </button>
          ))}
        </div>
      </div>
      <div style={{marginBottom:14}}>
        <label style={{display:"block",fontSize:11,fontWeight:700,color:"#4A5568",marginBottom:8,letterSpacing:0.5,textTransform:"uppercase"}}>Durée</label>
        <div style={{display:"flex",gap:8}}>
          {[{v:"full",l:"Journée(s)"},{v:"half",l:"Demi-journée"}].map(o=>(
            <button key={o.v} onClick={()=>set("halfDay")(o.v)} style={{flex:1,background:form.halfDay===o.v?NAVY:"#F7F9FC",color:form.halfDay===o.v?"#fff":"#4A5568",border:`1.5px solid ${form.halfDay===o.v?NAVY:"#E2E8F0"}`,borderRadius:10,padding:"0.6rem",fontSize:12,fontWeight:700,cursor:"pointer"}}>{o.l}</button>
          ))}
        </div>
      </div>
      {form.halfDay==="half"
        ?<Inp label="Date" type="date" value={form.dateStart} min={minDate} max={maxDate} onChange={e=>handleDate("dateStart")(e.target.value)}/>
        :<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <Inp label="Date début" type="date" value={form.dateStart} min={minDate} max={maxDate} onChange={e=>handleDate("dateStart")(e.target.value)}/>
          <Inp label="Date fin" type="date" value={form.dateEnd||form.dateStart} min={minDate} max={maxDate} onChange={e=>handleDate("dateEnd")(e.target.value)}/>
         </div>
      }
      {(!dateOk||!dateEndOk)&&<div style={{background:"#FFF5F5",border:"1.5px solid #FC8181",borderRadius:8,padding:"6px 10px",fontSize:12,color:"#C53030",fontWeight:700,marginBottom:8}}>⚠️ La date doit être en {ym?fmtYM(ym):""}</div>}
      <Inp label="Commentaire (optionnel)" value={form.note} onChange={e=>set("note")(e.target.value)} placeholder="Médecin, destination, motif…"/>
      <div style={{background:typ.bg,border:`1.5px solid ${typ.color}30`,borderRadius:12,padding:"0.85rem 1rem",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:20}}>{typ.icon}</span><span style={{color:typ.color,fontWeight:700,fontSize:14}}>{typ.label}</span></div>
        <span style={{color:typ.color,fontWeight:800,fontSize:20}}>{nb} jour{nb>1?"s":""}</span>
      </div>
      {form.halfDay!=="half"&&form.absType!=="mal"&&form.absType!=="accd"&&<div style={{background:"#EBF8FF",borderRadius:8,padding:"5px 10px",fontSize:11,color:"#2B6CB0",fontWeight:600,marginBottom:12}}>ℹ️ Week-ends et jours fériés exclus automatiquement</div>}

// ── PROFIL ÉDITABLE SALARIÉ ───────────────────────────────────────────────────
function ProfileEdit({employee,onSave,onClose,onExport,ym}){
  const[pin,setPin]=useState(employee.pin||"");
  const[photo,setPhoto]=useState(employee.photo||"");
  const[saving,setSaving]=useState(false);
  const[err,setErr]=useState("");
  const[saved,setSaved]=useState(false);
  const[bioState,setBioState]=useState("idle"); // idle | registering | done | error
  const hasBio=!!employee.credentialId;

  function handlePhoto(e){
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement("canvas");
        const size=Math.min(img.width,img.height);
        const sx=(img.width-size)/2,sy=(img.height-size)/2;
        canvas.width=64;canvas.height=64;
        canvas.getContext("2d").drawImage(img,sx,sy,size,size,0,0,100,100);
        setPhoto(canvas.toDataURL("image/jpeg",0.35));
        setSaved(false);
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(file);
  }

  async function handleSave(){
    if(!/^\d{4}$/.test(pin)){setErr("Le PIN doit faire exactement 4 chiffres.");return;}
    setSaving(true);setErr("");
    // #1 — Hasher le PIN avant sauvegarde
    const pinHash=await sha256(pin);
    await onSave({pin:pinHash,photo});
    setSaving(false);setSaved(true);
    setTimeout(()=>setSaved(false),2500);
  }

  async function handleRegisterBio(){
    if(!waSupported()){setErr("WebAuthn non supporté sur cet appareil.");return;}
    setBioState("registering");setErr("");
    try{
      const credId=await waRegister(employee.id,employee.name);
      await onSave({credentialId:credId});
      setBioState("done");
      adminLog("ENREG_BIO_PROFIL",`${employee.name} — biométrie configurée`);
      setTimeout(()=>setBioState("idle"),3000);
    }catch(e){
      setBioState("error");
      setErr(e.name==="NotAllowedError"?"Enregistrement annulé.":"Erreur : "+e.message);
    }
  }

  async function handleResetBio(){
    if(!window.confirm("Supprimer la biométrie de cet appareil ?\n\nVous devrez utiliser votre code PIN pour vous reconnecter."))return;
    await onSave({credentialId:""});
    setBioState("idle");
    adminLog("RESET_BIO_PROFIL",`${employee.name} — biométrie réinitialisée`);
  }

  return(
    <Card style={{marginBottom:"1.25rem",border:`1.5px solid ${NAVY}20`}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1rem"}}>
        <div style={{fontWeight:800,fontSize:15,color:NAVY}}>👤 Mon profil</div>
        <button onClick={onClose} style={{background:"none",border:"none",color:"#A0AEC0",fontSize:20,cursor:"pointer",lineHeight:1}}>×</button>
      </div>

      {/* Photo */}
      <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:"1rem"}}>
        <div style={{position:"relative",flexShrink:0}}>
          {photo
            ?<div style={{width:72,height:72,borderRadius:"50%",overflow:"hidden",border:`3px solid ${NAVY}20`}}><img src={photo} style={{width:"100%",height:"100%",objectFit:"cover"}}/></div>
            :<Avatar name={employee.name} size={72} bg={`${NAVY}15`} color={NAVY} fs={26}/>
          }
          <label style={{position:"absolute",bottom:0,right:0,width:24,height:24,background:MAG,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",border:"2px solid #fff"}}>
            <span style={{color:"#fff",fontSize:12}}>✏</span>
            <input type="file" accept="image/*" onChange={handlePhoto} style={{display:"none"}}/>
          </label>
        </div>
        <div>
          <div style={{fontWeight:800,fontSize:16,color:NAVY}}>{employee.name}</div>
          {employee.contractType&&(()=>{const c=ct(employee.contractType);return<span style={{fontSize:12,background:c.bg,color:c.color,borderRadius:6,padding:"2px 10px",fontWeight:700,display:"inline-block",marginTop:4}}>{c.label}</span>;})()}
          {employee.entryDate&&<div style={{fontSize:12,color:"#718096",marginTop:4}}>📅 Entrée : {fmtDate(employee.entryDate)}</div>}
        </div>
      </div>

      {/* Biométrie */}
      {waSupported()&&(
        <div style={{background:hasBio?"#F0FFF4":"#F7F9FC",border:`1.5px solid ${hasBio?"#9AE6B4":"#E2E8F0"}`,borderRadius:12,padding:"0.85rem 1rem",marginBottom:14}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:10}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:22}}>{hasBio?"🔐":"🔓"}</span>
              <div>
                <div style={{fontWeight:700,fontSize:13,color:hasBio?"#276749":NAVY}}>{hasBio?"Biométrie active":"Biométrie non configurée"}</div>
                <div style={{fontSize:11,color:"#718096",marginTop:1}}>{hasBio?"Empreinte / Face ID activé sur cet appareil":"Activez pour des connexions rapides"}</div>
              </div>
            </div>
            {hasBio
              ?<button onClick={handleResetBio} style={{background:"#FFF5F5",border:"1px solid #FEB2B2",borderRadius:8,padding:"5px 10px",fontSize:11,color:"#C53030",cursor:"pointer",fontWeight:700,flexShrink:0}}>Réinitialiser</button>
              :<button onClick={handleRegisterBio} disabled={bioState==="registering"} style={{background:NAVY,border:"none",borderRadius:8,padding:"6px 12px",fontSize:12,color:"#fff",cursor:"pointer",fontWeight:700,flexShrink:0,whiteSpace:"nowrap"}}>
                {bioState==="registering"?"⏳ …":"👆 Activer"}
              </button>
            }
          </div>
          {bioState==="done"&&<div style={{marginTop:8,fontSize:12,color:"#276749",fontWeight:700}}>✅ Biométrie enregistrée avec succès !</div>}
          {bioState==="error"&&err&&<div style={{marginTop:8,fontSize:12,color:"#C53030",fontWeight:600}}>⚠️ {err}</div>}
        </div>
      )}

      {/* PIN */}
      <Inp label="Nouveau code PIN (4 chiffres)" type="password" maxLength={4} value={pin}
        onChange={e=>{setPin(e.target.value);setErr("");setSaved(false);}}
        placeholder="••••" xstyle={{fontSize:24,textAlign:"center",letterSpacing:10,fontWeight:700}}/>
      {err&&bioState==="idle"&&<div style={{background:"#FFF5F5",border:"1.5px solid #FEB2B2",borderRadius:10,padding:"0.6rem 1rem",color:"#C53030",fontSize:13,marginBottom:10,fontWeight:600}}>⚠️ {err}</div>}
      {saved&&<div style={{background:"#F0FFF4",border:"1.5px solid #9AE6B4",borderRadius:10,padding:"0.6rem 1rem",color:"#276749",fontSize:13,marginBottom:10,fontWeight:600}}>✅ Profil mis à jour !</div>}
      <Btn onClick={handleSave} disabled={saving}>{saving?"Sauvegarde…":"💾 Enregistrer"}</Btn>
      <button onClick={onExport} style={{width:"100%",marginTop:10,background:`linear-gradient(135deg,${NAVY},${NAVYLT})`,color:"#fff",border:"none",borderRadius:12,padding:"11px",fontSize:13,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
        📥 Exporter toutes mes heures
      </button>
    </Card>
  );
}

function EmpDash({employee,employees,onLogout,onEmpUpdate}){
  const[entries,setEntries]=useState([]);
  const[loading,setLoading]=useState(true);
  const[saving,setSaving]=useState(false);
  const[syncError,setSyncError]=useState(false); // D4 — alerte sync
  const[ym,setYm]=useState(getYM());
  const[mode,setMode]=useState(null);
  const[editEntry,setEditEntry]=useState(null);
  const[filter,setFilter]=useState("all");
  const[showProfile,setShowProfile]=useState(false);
  const months=monthsSinceStart();
  const key=`fp:${employee.id}:${ym}`;

  function exportMyXLSX(){
    function getMondayOf(ds){const d=new Date(ds);const day=d.getDay();const diff=day===0?-6:1-day;const m=new Date(d);m.setDate(d.getDate()+diff);return m.toISOString().slice(0,10);}
    function getWeekNum(d){const dt=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));const dn=dt.getUTCDay()||7;dt.setUTCDate(dt.getUTCDate()+4-dn);const y=new Date(Date.UTC(dt.getUTCFullYear(),0,1));return Math.ceil((((dt-y)/86400000)+1)/7);}
    function fmtWeek(mon){const[y,m,d]=mon.split("-");const mo=new Date(Number(y),Number(m)-1,Number(d));const su=new Date(mo);su.setDate(mo.getDate()+6);const p=n=>String(n).padStart(2,"0");return`S${getWeekNum(mo)} — ${p(mo.getDate())}/${p(mo.getMonth()+1)} au ${p(su.getDate())}/${p(su.getMonth()+1)}/${su.getFullYear()}`;}
    function fmtHL(h){const hh=Math.floor(Math.abs(h)),mm=Math.round((Math.abs(h)-hh)*60);return`${h<0?"-":""}${hh}h${String(mm).padStart(2,"0")}`;}

    Promise.all(monthsSinceStart().map(m=>sg(`fp:${employee.id}:${m}`).then(d=>({m,data:d||[]})))).then(results=>{
      const all=results.flatMap(r=>r.data);
      if(!all.length){alert("Aucune donnée à exporter.");return;}

      const wm={};
      all.forEach(e=>{
        if(e.type==="absence"){
          let c=new Date(e.dateStart);const en=new Date(e.dateEnd||e.dateStart);
          while(c<=en){const ds=c.toISOString().slice(0,10);const mo=getMondayOf(ds);if(!wm[mo])wm[mo]={h:0,aj:0,ad:[]};wm[mo].aj+=e.halfDay==="half"?0.5:1;wm[mo].ad.push(at(e.absType).label);c.setDate(c.getDate()+1);}
        } else {const mo=getMondayOf(e.date);if(!wm[mo])wm[mo]={h:0,aj:0,ad:[]};wm[mo].h+=calcH(e.startTime,e.endTime,e.breakMin);}
      });
      const mondays=Object.keys(wm).sort();
      const contratInfo=ct(employee.contractType);

      const sheet1=[
        [`MES HEURES — ${employee.name.toUpperCase()}`,"","","","","",""],
        [`Contrat : ${contratInfo.label||"—"}   |   Entrée : ${employee.entryDate?fmtDate(employee.entryDate):"—"}   |   Base : 35h/semaine`],
        [""],
        ["Semaine","Heures travaillées","Jours absence","Type(s) absence","Heures requises (35h)","Différence","Statut"],
      ];
      let tH=0,tR=0,tD=0;
      mondays.forEach(mo=>{
        const w=wm[mo];const h=w.h;const aj=w.aj;
        const req=Math.max(0,35-(aj*7));const diff=h-req;
        tH+=h;tR+=req;tD+=diff;
        sheet1.push([fmtWeek(mo),fmtHL(h),aj>0?`${aj}j`:"",[ ...new Set(w.ad)].join(", ")||"",fmtHL(req),fmtHL(diff),diff>0?"✓ Excédent":diff===0?"✓ Exact":"⚠ Déficit"]);
      });
      sheet1.push(["TOTAL GÉNÉRAL",fmtHL(tH),"","",fmtHL(tR),fmtHL(tD),tD>=0?"✓ Excédent":"⚠ Déficit"]);

      const sheet2=[
        [`DÉTAIL JOURNALIER — ${employee.name.toUpperCase()}`],
        [""],
        ["Date","Jour","Type","Heure début","Heure fin","Pause (min)","Heures effectives","Chantier / Note","Type absence","Jours abs."],
      ];
      all.slice().sort((a,b)=>(a.date||a.dateStart).localeCompare(b.date||b.dateStart)).forEach(e=>{
        const isA=e.type==="absence";
        const ds=e.date||e.dateStart;const[y,m,d]=ds.split("-");
        const jour=DAYS_FR[new Date(Number(y),Number(m)-1,Number(d)).getDay()];
        if(isA){const typ=at(e.absType);const dr=e.dateEnd&&e.dateEnd!==e.dateStart?`${fmtDate(e.dateStart)} → ${fmtDate(e.dateEnd)}`:fmtDate(e.dateStart);sheet2.push([dr,jour,"Absence","","","","",e.note||"",typ.label,e.halfDay==="half"?"0.5":String(e.nbDays||1)]);}
        else{sheet2.push([fmtDate(ds),jour,"Travail",e.startTime,e.endTime,e.breakMin||"0",fmtHL(calcH(e.startTime,e.endTime,e.breakMin)),e.note||"","",""]);}
      });

      // F4 — Onglet Tickets & Paniers par mois (seuil >6h, sans absences)
      const mealT=employee.mealType||"ticket";
      const mealLabel=mealT==="panier"?"🧺 Panier repas":"🎟 Ticket restaurant";
      const sheet3=[
        [`TICKETS & PANIERS — ${employee.name.toUpperCase()}`,"","",""],
        [`Type d'avantage : ${mealLabel}   |   Règle : journée > 6h effectives sans absence`,"","",""],
        [""],
        ["Mois","Jours éligibles (>6h)","Nb "+( mealT==="ticket"?"tickets":"paniers"),"Cumul"],
      ];
      let cumul=0;
      results.sort((a,b)=>a.m.localeCompare(b.m)).forEach(({m,data})=>{
        if(!data.length)return;
        // Dates d'absence du mois
        const absEntries=data.filter(e=>e.type==="absence");
        const absDates=new Set();
        absEntries.forEach(e=>{
          let cur=new Date(e.dateStart);const end=new Date(e.dateEnd||e.dateStart);
          while(cur<=end){absDates.add(cur.toISOString().slice(0,10));cur.setDate(cur.getDate()+1);}
        });
        // Heures par date
        const hoursByDate={};
        data.filter(e=>e.type==="work"||!e.type).forEach(e=>{
          if(!e.date)return;
          if(!hoursByDate[e.date])hoursByDate[e.date]=0;
          hoursByDate[e.date]+=calcH(e.startTime,e.endTime,e.breakMin);
        });
        const jours=Object.entries(hoursByDate).filter(([date,h])=>h>6&&!absDates.has(date)).length;
        if(jours===0)return;
        cumul+=jours;
        sheet3.push([fmtYM(m),jours,jours,cumul]);
      });
      sheet3.push(["TOTAL",cumul,cumul,""]);

      const wb=XLSX.utils.book_new();
      const ws1=XLSX.utils.aoa_to_sheet(sheet1);
      const ws2=XLSX.utils.aoa_to_sheet(sheet2);
      const ws3=XLSX.utils.aoa_to_sheet(sheet3);
      ws1["!cols"]=[{wch:36},{wch:20},{wch:13},{wch:28},{wch:22},{wch:14},{wch:14}];
      ws2["!cols"]=[{wch:30},{wch:8},{wch:10},{wch:12},{wch:12},{wch:12},{wch:18},{wch:26},{wch:22},{wch:12}];
      ws3["!cols"]=[{wch:22},{wch:18},{wch:18},{wch:12}];
      XLSX.utils.book_append_sheet(wb,ws1,"Synthèse hebdo");
      XLSX.utils.book_append_sheet(wb,ws2,"Détail journalier");
      XLSX.utils.book_append_sheet(wb,ws3,"Tickets & Paniers");
      XLSX.writeFile(wb,`mes_heures_${employee.name.replace(/ /g,"_")}.xlsx`);
      adminLog("EXPORT_EMPLOYE",`${employee.name} — export personnel`);
    });
  }

  useEffect(()=>{
    setLoading(true);setMode(null);setEditEntry(null);
    // Sheets = source de vérité absolue
    // Local = fallback uniquement si Sheets est inaccessible
    sg(key).then(remote=>{
      if(remote&&remote.length>0){
        // Sheets a des données → les prendre comme base
        // Ajouter uniquement les entrées locales plus récentes NON présentes dans Sheets
        const local=lsg(key)||[];
        const remoteIds=new Set(remote.map(e=>e.id));
        // Entrées locales absentes de Sheets ET avec updatedAt récent (< 5 min)
        const recentLocal=local.filter(e=>
          !remoteIds.has(e.id)&&
          !e.deleted&&
          (Date.now()-(e.updatedAt||0))<5*60*1000
        );
        const merged=[...remote,...recentLocal]
          .filter(e=>!e.deleted)
          .sort((a,b)=>(a.date||a.dateStart||"").localeCompare(b.date||b.dateStart||""));
        lss(key,merged); // mettre à jour le local avec la vérité Sheets
        setEntries(merged);
      } else {
        // Sheets vide ou inaccessible → fallback local
        const local=(lsg(key)||[]).filter(e=>!e.deleted);
        setEntries(local);
      }
      setLoading(false);
    }).catch(()=>{
      // Réseau coupé → local uniquement
      setEntries((lsg(key)||[]).filter(e=>!e.deleted));
      setLoading(false);
    });
  },[key]);

  async function save(form){
    setSaving(true);setSyncError(false);
    const entry={...form,id:editEntry?.id||uuid('e'),updatedAt:Date.now()};
    const next=editEntry
      ?entries.map(e=>e.id===editEntry.id?entry:e)
      :[...entries,entry].sort((a,b)=>(a.date||a.dateStart).localeCompare(b.date||b.dateStart));
    setEntries(next.filter(e=>!e.deleted));
    // Écriture fiable — await + feedback immédiat
    const ok=await safeSave(key,next,()=>setSyncError(true));
    if(!ok) setSyncError(true);
    setSaving(false);setMode(null);setEditEntry(null);
  }
  async function del(id){
    setSyncError(false);
    const now=Date.now();
    // Tombstone : updatedAt = maintenant → local gagne sur Sheets (fenêtre 60s)
    const next=entries.map(e=>e.id===id
      ?{...e,deleted:true,deletedAt:now,updatedAt:now}
      :e);
    // Afficher sans les tombstones
    setEntries(next.filter(e=>!e.deleted));
    // Envoyer la liste complète avec tombstone → Sheets sera mis à jour
    const ok=await safeSave(key,next,()=>setSyncError(true));
    if(!ok) setSyncError(true);
  }

  const work=entries.filter(e=>e.type==="work"||e.type==="forfait"||!e.type);
  const abs=entries.filter(e=>e.type==="absence");
  const totalH=work.filter(e=>e.type!=="forfait").reduce((s,e)=>s+calcH(e.startTime,e.endTime,e.breakMin),0);
  const totalForfaitJours=work.filter(e=>e.type==="forfait").length;
  const totalAbsDays=abs.reduce((s,e)=>s+Number(e.nbDays||1),0);
  const shown=filter==="work"?work:filter==="absence"?abs:entries;

  // F1 — Vue semaine : calcul des heures de la semaine courante
  const weekH=(()=>{
    const now=new Date();const wd=now.getDay()||7;
    const mon=new Date(now);mon.setDate(now.getDate()-(wd-1));
    const sun=new Date(mon);sun.setDate(mon.getDate()+6);
    const toStr=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
    const monS=toStr(mon),sunS=toStr(sun);
    return work.filter(e=>e.date>=monS&&e.date<=sunS).reduce((s,e)=>s+calcH(e.startTime,e.endTime,e.breakMin),0);
  })();
  const weekTarget=35;
  const weekRemain=Math.max(0,weekTarget-weekH);

  return(
    <div style={{minHeight:"100vh",background:"#F4F6FA",paddingBottom:"2rem"}}>
      <div style={{background:`linear-gradient(135deg,${NAVYDK},${NAVYLT})`,paddingBottom:"3rem"}}>
        <div style={{padding:"1rem 1.25rem",display:"flex",alignItems:"center",justifyContent:"space-between",maxWidth:460,margin:"0 auto"}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            {employee.photo
              ?<div style={{width:40,height:40,borderRadius:"50%",overflow:"hidden",flexShrink:0,border:"2px solid rgba(255,255,255,0.4)"}}><img src={employee.photo} style={{width:"100%",height:"100%",objectFit:"cover"}}/></div>
              :<Avatar name={employee.name} size={40} bg="rgba(255,255,255,0.2)" color="#fff" fs={14}/>
            }
            <div>
              <div style={{color:"rgba(255,255,255,0.55)",fontSize:11,fontWeight:700,letterSpacing:1}}>BONJOUR</div>
              <div style={{color:"#fff",fontWeight:800,fontSize:17}}>{employee.name}</div>
            </div>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            {/* D4 — Indicateur sync */}
            {syncError&&<div title="Erreur de synchronisation — données sauvées localement, seront renvoyées automatiquement" style={{background:"rgba(197,48,48,0.3)",border:"1px solid rgba(197,48,48,0.5)",borderRadius:8,padding:"5px 9px",fontSize:11,color:"#FEB2B2",fontWeight:700,cursor:"pointer"}} onClick={()=>retryQueueFlush()}>⚠️ Sync KO — Appuyer pour réessayer</div>}
            {saving&&<div style={{background:"rgba(72,187,120,0.2)",border:"1px solid rgba(72,187,120,0.3)",borderRadius:8,padding:"5px 9px",fontSize:11,color:"#9AE6B4",fontWeight:700}}>⟳ Envoi vers Sheets…</div>}
            <button onClick={()=>setShowProfile(p=>!p)} style={{background:"rgba(255,255,255,0.12)",border:"1px solid rgba(255,255,255,0.2)",borderRadius:10,padding:"7px 13px",color:"#fff",fontSize:12,cursor:"pointer",fontWeight:600}}>👤 Profil</button>
            <button onClick={onLogout} style={{background:"rgba(255,255,255,0.12)",border:"1px solid rgba(255,255,255,0.2)",borderRadius:10,padding:"7px 13px",color:"#fff",fontSize:12,cursor:"pointer",fontWeight:600}}>Déconnexion</button>
          </div>
        </div>
      </div>

      <div style={{padding:"0 1.25rem",maxWidth:460,margin:"0 auto"}}>
        {showProfile&&(
          <ProfileEdit employee={employee} onSave={async(updates)=>{
            const next=employees.map(e=>e.id===employee.id?{...e,...updates}:e);
            await ss("fp:employees",next);
            onEmpUpdate({...employee,...updates});
          }} onCheckPin={(pin,id)=>{const dup=employees.find(e=>e.pin===pin&&e.id!==id);return dup?dup.name:null;}} onClose={()=>setShowProfile(false)} onExport={exportMyXLSX} ym={ym}/>
        )}

        <Card style={{marginTop:"-2rem",marginBottom:"1.25rem"}}>
          <div style={{display:"flex",gap:10,marginBottom:"0.75rem"}}>
            {[{v:fmtH(totalH),l:"HEURES",c:NAVY},{v:work.length,l:"JOURS TRAV.",c:MAG},{v:totalAbsDays,l:"JOURS ABS.",c:"#C53030"}].map(({v,l,c})=>(
              <div key={l} style={{flex:1,textAlign:"center",padding:"0.8rem",background:`${c}10`,borderRadius:14}}>
                <div style={{fontSize:19,fontWeight:800,color:c}}>{v}</div>
                <div style={{fontSize:9,color:"#718096",marginTop:2,fontWeight:700,letterSpacing:0.3}}>{l}</div>
              </div>
            ))}
          </div>
          {/* F1 — Vue semaine courante */}
          <div style={{background:`linear-gradient(135deg,${NAVY}08,${MAG}06)`,borderRadius:12,padding:"0.7rem 1rem",marginBottom:"0.75rem",display:"flex",alignItems:"center",justifyContent:"space-between",border:`1px solid ${NAVY}10`}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:14}}>📅</span>
              <div>
                <div style={{fontSize:10,fontWeight:700,color:"#718096",letterSpacing:0.4}}>SEMAINE EN COURS</div>
                <div style={{fontSize:13,fontWeight:800,color:NAVY}}>{fmtH(weekH)} <span style={{fontWeight:500,color:"#718096",fontSize:11}}>/ {weekTarget}h</span></div>
              </div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:10,fontWeight:700,color:weekRemain===0?"#276749":"#B7791F",letterSpacing:0.4}}>{weekRemain===0?"✓ OBJECTIF ATTEINT":"RESTANT"}</div>
              <div style={{fontSize:13,fontWeight:800,color:weekRemain===0?"#276749":"#B7791F"}}>{weekRemain===0?"":fmtH(weekRemain)}</div>
            </div>
          </div>
          <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:2}}>
            {months.map(m=>(
              <button key={m} onClick={()=>{setYm(m);setFilter("all");}} style={{background:m===ym?NAVY:"transparent",color:m===ym?"#fff":"#718096",border:m===ym?"none":"1.5px solid #E2E8F0",borderRadius:9,padding:"5px 12px",fontSize:12,cursor:"pointer",whiteSpace:"nowrap",fontWeight:700,flexShrink:0}}>{fmtYM(m)}</button>
            ))}
          </div>
        </Card>

        {saving&&<div style={{background:`${NAVY}10`,border:`1px solid ${NAVY}20`,borderRadius:10,padding:"8px 14px",marginBottom:12,display:"flex",alignItems:"center",gap:8,fontSize:13,color:NAVY,fontWeight:600}}>
          <div style={{width:14,height:14,border:`2px solid ${NAVY}30`,borderTop:`2px solid ${NAVY}`,borderRadius:"50%",animation:"spin 0.8s linear infinite",flexShrink:0}}/> Synchronisation en cours…
          <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
        </div>}

        {!mode&&!editEntry&&(
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:"1.25rem"}}>
            <Btn onClick={()=>setMode("work")}>⏱ Heures</Btn>
            <Btn onClick={()=>setMode("absence")} variant="green">📅 Absence</Btn>
          </div>
        )}

        {mode==="work"&&(employee.contractType==="forfait"
          ?<ForfaitForm ym={ym} onSave={save} onCancel={()=>setMode(null)}/>
          :<WorkForm ym={ym} onSave={save} onCancel={()=>setMode(null)}/>)}
        {mode==="absence"&&<AbsForm ym={ym} onSave={save} onCancel={()=>setMode(null)}/>}
        {editEntry&&(editEntry.type==="absence"
          ?<AbsForm ym={ym} initial={editEntry} onSave={save} onCancel={()=>setEditEntry(null)}/>
          :editEntry.type==="forfait"||employee.contractType==="forfait"
            ?<ForfaitForm ym={ym} initial={editEntry} onSave={save} onCancel={()=>setEditEntry(null)}/>
            :<WorkForm ym={ym} initial={editEntry} onSave={save} onCancel={()=>setEditEntry(null)}/>)}

        {loading?<Spinner/>:(
          <>
            {entries.length>0&&!mode&&!editEntry&&(
              <div style={{display:"flex",gap:6,marginBottom:14}}>
                {[{v:"all",l:"Tout"},{v:"work",l:`⏱ ${work.length}`},{v:"absence",l:`📅 ${abs.length}`}].map(t=>(
                  <button key={t.v} onClick={()=>setFilter(t.v)} style={{background:t.v===filter?NAVY:"#fff",color:t.v===filter?"#fff":"#718096",border:`1.5px solid ${t.v===filter?NAVY:"#E2E8F0"}`,borderRadius:9,padding:"5px 12px",fontSize:12,cursor:"pointer",fontWeight:700,flexShrink:0}}>{t.l}</button>
                ))}
              </div>
            )}
            {entries.length===0?(
              <div style={{textAlign:"center",padding:"3rem 1rem"}}>
                <div style={{fontSize:52,marginBottom:"1rem"}}>📋</div>
                <p style={{color:"#A0AEC0",fontSize:15,fontWeight:600}}>Aucune entrée pour ce mois</p>
                <p style={{color:"#CBD5E0",fontSize:13}}>Utilisez les boutons ci-dessus pour saisir</p>
              </div>
            ):(
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                {shown.map(entry=>{
                  const isAbs=entry.type==="absence";
                  const isForfait=entry.type==="forfait";
                  const typ=isAbs?at(entry.absType):null;
                  const h=isAbs||isForfait?null:calcH(entry.startTime,entry.endTime,entry.breakMin);
                  const accent=isAbs?typ.color:isForfait?"#6B46C1":MAG;
                  return(
                    <div key={entry.id} style={{background:"#fff",borderRadius:16,padding:"1rem 1.25rem",boxShadow:"0 2px 10px rgba(0,0,0,0.05)",borderLeft:`4px solid ${accent}`,display:"flex",alignItems:"center",gap:12}}>
                      {isAbs&&<span style={{fontSize:22,flexShrink:0}}>{typ.icon}</span>}
                      {isForfait&&<span style={{fontSize:22,flexShrink:0}}>📅</span>}
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2,flexWrap:"wrap"}}>
                          <span style={{fontWeight:800,fontSize:14,color:NAVY}}>{fmtDate(entry.date||entry.dateStart)}</span>
                          {isAbs&&<Badge color={typ.color} bg={typ.bg}>{typ.label}</Badge>}
                          {isForfait&&<Badge color="#6B46C1" bg="#FAF5FF">Forfait jour</Badge>}
                        </div>
                        {isAbs?(
                          <div style={{color:"#718096",fontSize:12}}>
                            {entry.halfDay==="half"?"Demi-journée":(entry.dateEnd&&entry.dateEnd!==entry.dateStart?`→ ${fmtDate(entry.dateEnd)}`:"Journée entière")}
                            {entry.note&&<div style={{marginTop:3,color:"#4A5568",fontStyle:"italic"}}>"{entry.note}"</div>}
                          </div>
                        ):isForfait?(
                          <div style={{color:"#718096",fontSize:12}}>
                            Journée complète — panier repas inclus
                            {entry.note&&<div style={{marginTop:3,color:"#4A5568",fontStyle:"italic"}}>"{entry.note}"</div>}
                          </div>
                        ):(
                          <>
                            <div style={{color:"#718096",fontSize:13}}>{entry.startTime} → {entry.endTime}{Number(entry.breakMin)>0&&<span style={{color:"#A0AEC0"}}> · Pause {entry.breakMin}min</span>}</div>
                            {entry.note&&<div style={{color:"#4A5568",fontSize:12,marginTop:3,background:"#F7F9FC",borderRadius:6,padding:"2px 8px",display:"inline-block"}}>📍 {entry.note}</div>}
                          </>
                        )}
                      </div>
                      <div style={{textAlign:"right",flexShrink:0}}>
                        <div style={{fontWeight:800,fontSize:18,color:accent}}>{isAbs?`${entry.nbDays||1}j`:isForfait?"1j":fmtH(h)}</div>
                        <div style={{display:"flex",gap:5,marginTop:5,justifyContent:"flex-end"}}>
                          <button onClick={()=>{setEditEntry(entry);setMode(null);}} style={{background:`${NAVY}10`,border:"none",borderRadius:7,padding:"4px 9px",fontSize:12,color:NAVY,cursor:"pointer"}}>✏</button>
                          <button onClick={()=>{if(window.confirm("Supprimer cette entrée ?"))del(entry.id);}} style={{background:"#FFF5F5",border:"none",borderRadius:7,padding:"4px 9px",fontSize:12,color:"#C53030",cursor:"pointer"}}>🗑</button>
                        </div>
                      </div>
                    </div>
                  );
                })}
                <div style={{background:`linear-gradient(135deg,${NAVY},${NAVYLT})`,borderRadius:16,padding:"1rem 1.25rem",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div>
                    <div style={{color:"rgba(255,255,255,0.6)",fontSize:11,fontWeight:700,letterSpacing:0.5}}>TOTAL {fmtYM(ym).toUpperCase()}</div>
                    {totalAbsDays>0&&<div style={{color:"rgba(255,255,255,0.45)",fontSize:11,marginTop:2}}>{totalAbsDays} j. absence</div>}
                  </div>
                  <div style={{color:"#fff",fontWeight:800,fontSize:22}}>{fmtH(totalH)}</div>
                </div>
              </div>
            )}
          </>
        )}
      </div>
    </div>
  );
}

// ── LOGIN ADMIN ───────────────────────────────────────────────────────────────
function AdminLogin({onLogin,onBack}){
  const[pass,setPass]=useState("");
  const[err,setErr]=useState("");
  const[checking,setChecking]=useState(false);
  async function doLogin(){
    if(!pass)return;
    setChecking(true);
    const h=await sha256(pass);
    if(h===ADMIN_HASH){onLogin();}
    else{setErr("Mot de passe incorrect.");setPass("");}
    setChecking(false);
  }
  return(
    <div style={{minHeight:"100vh",background:`linear-gradient(155deg,${NAVYDK},${NAVYLT})`,display:"flex",alignItems:"center",justifyContent:"center",padding:"2rem"}}>
      <div style={{background:"#fff",borderRadius:24,padding:"2rem",width:"100%",maxWidth:380,boxShadow:"0 24px 64px rgba(0,0,0,0.35)"}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:"#A0AEC0",fontSize:13,cursor:"pointer",padding:"0 0 1.5rem",display:"flex",alignItems:"center",gap:4,fontWeight:600}}>← Retour</button>
        <div style={{textAlign:"center",marginBottom:"1.75rem"}}>
          <div style={{width:60,height:60,borderRadius:18,background:`${NAVY}10`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:30,margin:"0 auto 1rem"}}>📊</div>
          <h2 style={{fontWeight:800,fontSize:22,color:NAVY,margin:0}}>Back Office</h2>
          <p style={{color:"#A0AEC0",fontSize:14,margin:"5px 0 0"}}>Accès administrateur Fermapro</p>
        </div>
        <Inp label="Mot de passe" type="password" value={pass} onChange={e=>{setPass(e.target.value);setErr("");}} onKeyDown={e=>e.key==="Enter"&&pass&&doLogin()} placeholder="Mot de passe administrateur"/>
        {err&&<div style={{background:"#FFF5F5",border:"1.5px solid #FEB2B2",borderRadius:10,padding:"0.75rem 1rem",color:"#C53030",fontSize:13,marginBottom:14,fontWeight:600}}>⚠️ {err}</div>}
        <Btn onClick={doLogin} disabled={!pass||checking}>{checking?"Vérification…":"Accéder au back office"}</Btn>
      </div>
    </div>
  );
}

// ── GESTION SALARIÉS ──────────────────────────────────────────────────────────
function EmpManager({employees,onUpdate}){
  const COLS=["#1E3A7B","#E8457A","#2F855A","#B7791F","#6B46C1","#C53030","#2B6CB0","#276749"];
  const emptyForm={name:"",pin:"",contractType:"cdi",entryDate:"",photo:"",email:"",phone:"",mealType:"ticket"};
  const[form,setForm]=useState(emptyForm);
  const[editId,setEditId]=useState(null);
  const[err,setErr]=useState("");
  const[confirmDel,setConfirmDel]=useState(null);
  const[toast,setToast]=useState("");
  const[saving,setSaving]=useState(false);
  const setF=k=>v=>setForm(f=>({...f,[k]:v}));
  function showToast(msg){setToast(msg);setTimeout(()=>setToast(""),2800);}

  function handlePhoto(e){
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement("canvas");
        const size=Math.min(img.width,img.height);
        const sx=(img.width-size)/2,sy=(img.height-size)/2;
        canvas.width=64;canvas.height=64;
        const ctx=canvas.getContext("2d");
        ctx.drawImage(img,sx,sy,size,size,0,0,100,100);
        setF("photo")(canvas.toDataURL("image/jpeg",0.35));
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(file);
  }

  function validate(){
    if(!form.name.trim())return"Nom obligatoire.";
    // En modification : PIN vide = conserver l'ancien (pas obligatoire)
    if(!editId&&!/^\d{4}$/.test(form.pin))return"PIN doit faire 4 chiffres.";
    if(editId&&form.pin&&!/^\d{4}$/.test(form.pin))return"PIN doit faire 4 chiffres (ou laisser vide pour ne pas changer).";
    return"";
  }
  async function saveEmp(){
    const e=validate();if(e){setErr(e);return;}
    setSaving(true);
    // #1 — PIN : si vide en modification → conserver l'ancien hash
    let pinHash;
    if(form.pin){
      pinHash=await sha256(form.pin);
      // Vérifier doublon
      const dup=employees.find(em=>{
        const stored=em.pin||"";
        return em.id!==editId&&(stored===pinHash||(stored.length===4&&stored===form.pin));
      });
      if(dup){setErr(`PIN déjà utilisé par ${dup.name}.`);setSaving(false);return;}
    } else if(editId){
      // PIN vide en modif → garder l'ancien
      pinHash=employees.find(e=>e.id===editId)?.pin||"";
    } else {
      setErr("PIN obligatoire.");setSaving(false);return;
    }
    let next;
    const data={name:sanitize(form.name.trim(),100),pin:pinHash,contractType:form.contractType,entryDate:form.entryDate,photo:form.photo,email:sanitize(form.email||'',200),phone:sanitize(form.phone||'',20),mealType:form.mealType||"ticket"};
    if(editId){next=employees.map(emp=>emp.id===editId?{...emp,...data}:emp);showToast("✓ Modifié et synchronisé");adminLog("MODIF_EMPLOYE",`${data.name} (${editId})`);}
    else{next=[...employees,{id:uuid('emp_'),...data}];showToast("✓ Ajouté et synchronisé");adminLog("AJOUT_EMPLOYE",data.name);}
    await ss("fp:employees",next);
    onUpdate(next);setForm(emptyForm);setEditId(null);setErr("");setSaving(false);
  }
  async function delEmp(id){
    const emp=employees.find(e=>e.id===id);
    const months=monthsSinceStart();
    let hasData=false;
    for(const m of months){
      const d=await sg(`fp:${id}:${m}`);
      if(d&&d.length>0){hasData=true;break;}
    }
    if(hasData){
      const ok=window.confirm("⚠️ Ce salarié a des heures enregistrées.\n\nIl sera archivé (soft delete) pour conserver ses données.\nSes données restent accessibles dans les rapports.");
      if(!ok){setConfirmDel(null);return;}
    }
    // D3 — Soft delete : on marque deleted:true au lieu de supprimer
    const next=employees.map(e=>e.id===id?{...e,deleted:true,archived:true,deletedAt:new Date().toISOString()}:e);
    await ss("fp:employees",next);
    onUpdate(next);setConfirmDel(null);showToast("Salarié archivé (données conservées)");
    // F3 — Log admin
    adminLog("SUPPRESSION_EMPLOYE",`${emp?.name} (${id}) — soft delete`);
  }

  return(
    <div style={{position:"relative"}}>
      {toast&&<div style={{position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",background:NAVY,color:"#fff",borderRadius:12,padding:"10px 22px",fontSize:14,fontWeight:700,zIndex:999,boxShadow:"0 8px 24px rgba(0,0,0,0.2)",whiteSpace:"nowrap"}}>{toast}</div>}
      {confirmDel&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",zIndex:998,display:"flex",alignItems:"center",justifyContent:"center",padding:"1.5rem"}}>
          <div style={{background:"#fff",borderRadius:20,padding:"1.75rem",maxWidth:340,width:"100%"}}>
            <div style={{fontSize:36,textAlign:"center",marginBottom:"1rem"}}>⚠️</div>
            <h3 style={{fontWeight:800,textAlign:"center",margin:"0 0 0.5rem"}}>Supprimer ?</h3>
            <p style={{color:"#718096",fontSize:14,textAlign:"center",margin:"0 0 1.5rem"}}><strong style={{color:NAVY}}>{employees.find(e=>e.id===confirmDel)?.name}</strong> sera supprimé(e).</p>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}><Btn variant="outline" onClick={()=>setConfirmDel(null)}>Annuler</Btn><Btn variant="danger" onClick={()=>delEmp(confirmDel)}>Supprimer</Btn></div>
          </div>
        </div>
      )}

      <Card style={{marginBottom:"1.25rem",border:`2px solid ${editId?MAG+"40":NAVY+"15"}`}}>
        <h3 style={{fontWeight:800,color:editId?MAG:NAVY,fontSize:15,margin:"0 0 1.25rem",display:"flex",alignItems:"center",gap:8}}>
          <span style={{background:editId?`${MAG}15`:`${NAVY}12`,color:editId?MAG:NAVY,width:28,height:28,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0}}>{editId?"✏":"+"}</span>
          {editId?`Modifier — ${employees.find(e=>e.id===editId)?.name}`:"Ajouter un salarié"}
        </h3>

        <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:16}}>
          <div style={{width:72,height:72,borderRadius:"50%",overflow:"hidden",background:`${NAVY}10`,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",border:`2px dashed ${NAVY}30`}}>
            {form.photo?<img src={form.photo} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<span style={{fontSize:30}}>📷</span>}
          </div>
          <div style={{flex:1}}>
            <label style={{display:"block",fontSize:11,fontWeight:700,color:"#4A5568",marginBottom:6,letterSpacing:0.5,textTransform:"uppercase"}}>Photo d'identité</label>
            <label style={{display:"inline-flex",alignItems:"center",gap:8,background:`${NAVY}10`,color:NAVY,borderRadius:10,padding:"7px 14px",fontSize:12,fontWeight:700,cursor:"pointer",border:`1.5px solid ${NAVY}20`}}>
              📁 Choisir une photo
              <input type="file" accept="image/*" onChange={handlePhoto} style={{display:"none"}}/>
            </label>
            {form.photo&&<button onClick={()=>setF("photo")("")} style={{marginLeft:8,background:"#FFF5F5",color:"#C53030",border:"none",borderRadius:8,padding:"7px 10px",fontSize:11,fontWeight:700,cursor:"pointer"}}>✕ Retirer</button>}
          </div>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <Inp label="Nom complet" value={form.name} onChange={e=>{setF("name")(e.target.value);setErr("");}} placeholder="Prénom Nom"/>
          <Inp label={editId?"Nouveau code PIN (vide = inchangé)":"Code PIN (4 chiffres)"} type="text" inputMode="numeric" maxLength={4} value={form.pin} onChange={e=>{setF("pin")(e.target.value.replace(/\D/,""));setErr("");}} placeholder={editId?"Laisser vide":"1234"} xstyle={{letterSpacing:8,fontWeight:700}}/>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <div style={{marginBottom:14}}>
            <label style={{display:"block",fontSize:11,fontWeight:700,color:"#4A5568",marginBottom:5,letterSpacing:0.5,textTransform:"uppercase"}}>Type de contrat</label>
            <select value={form.contractType} onChange={e=>setF("contractType")(e.target.value)}
              style={{width:"100%",padding:"0.75rem 1rem",borderRadius:10,border:"1.5px solid #E2E8F0",fontSize:14,outline:"none",background:"#fff",color:"#1A202C"}}>
              {CONTRATS.map(c=><option key={c.id} value={c.id}>{c.label}</option>)}
            </select>
          </div>
          <Inp label="Date d'entrée" type="date" value={form.entryDate} onChange={e=>setF("entryDate")(e.target.value)}/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <Inp label="Adresse email" type="email" value={form.email||""} onChange={e=>{setF("email")(e.target.value);}} placeholder="prenom@exemple.fr"/>
          <Inp label="Téléphone portable" type="tel" value={form.phone||""} onChange={e=>{setF("phone")(e.target.value);}} placeholder="06 12 34 56 78"/>
        </div>

        <div style={{marginBottom:14}}>
          <label style={{display:"block",fontSize:11,fontWeight:700,color:"#4A5568",marginBottom:8,letterSpacing:0.5,textTransform:"uppercase"}}>🍽 Avantage repas</label>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            {[{v:"ticket",icon:"🎟",label:"Ticket restaurant"},{v:"panier",icon:"🧺",label:"Panier repas"}].map(o=>(
              <button key={o.v} onClick={()=>setF("mealType")(o.v)}
                style={{padding:"0.75rem",borderRadius:12,border:`2px solid ${form.mealType===o.v?NAVY:"#E2E8F0"}`,background:form.mealType===o.v?`${NAVY}08`:"#F7F9FC",fontWeight:700,fontSize:13,cursor:"pointer",color:form.mealType===o.v?NAVY:"#718096",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                <span>{o.icon}</span>{o.label}
              </button>
            ))}
          </div>
        </div>

        {err&&<div style={{background:"#FFF5F5",border:"1.5px solid #FEB2B2",borderRadius:10,padding:"0.7rem 1rem",color:"#C53030",fontSize:13,marginBottom:14,fontWeight:600}}>⚠️ {err}</div>}
        <div style={{display:"grid",gridTemplateColumns:editId?"1fr 1fr":"1fr",gap:10}}>
          {editId&&<Btn variant="outline" onClick={()=>{setEditId(null);setForm(emptyForm);setErr("");}}>Annuler</Btn>}
          <Btn onClick={saveEmp} disabled={!form.name||((!editId)&&form.pin.length!==4)||saving}>{saving?"Synchronisation…":(editId?"✓ Enregistrer":"+ Ajouter")}</Btn>
        </div>
      </Card>

      {(()=>{
        const[showArchived,setShowArchived]=React.useState(false);
        const active=employees.filter(e=>!e.archived);
        const archived=employees.filter(e=>e.archived);
        const list=showArchived?archived:active;

        async function toggleArchive(id){
          const emp=employees.find(e=>e.id===id);
          const label=emp.archived?"Réactiver":"Archiver";
          if(!window.confirm(`${label} ${emp.name} ?${!emp.archived?"\n\nIl/elle n'apparaîtra plus sur la page de connexion.":""}`))return;
          const next=employees.map(e=>e.id===id?{...e,archived:!e.archived}:e);
          await ss("fp:employees",next);
          onUpdate(next);
          showToast(emp.archived?"✓ Salarié réactivé":"✓ Salarié archivé");
        }

        return(
          <Card style={{padding:0,overflow:"hidden"}}>
            <div style={{padding:"1rem 1.5rem",borderBottom:"1px solid #EDF2F7",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
              <span style={{fontWeight:800,color:NAVY,fontSize:15}}>Base salariée</span>
              <div style={{display:"flex",gap:6}}>
                <button onClick={()=>setShowArchived(false)} style={{background:!showArchived?NAVY:"transparent",color:!showArchived?"#fff":"#718096",border:`1.5px solid ${!showArchived?NAVY:"#E2E8F0"}`,borderRadius:8,padding:"4px 12px",fontSize:12,fontWeight:700,cursor:"pointer"}}>
                  Actifs ({active.length})
                </button>
                <button onClick={()=>setShowArchived(true)} style={{background:showArchived?"#718096":"transparent",color:showArchived?"#fff":"#718096",border:`1.5px solid ${showArchived?"#718096":"#E2E8F0"}`,borderRadius:8,padding:"4px 12px",fontSize:12,fontWeight:700,cursor:"pointer"}}>
                  Archivés ({archived.length})
                </button>
              </div>
            </div>
            {list.length===0
              ?<div style={{textAlign:"center",padding:"2rem",color:"#A0AEC0"}}><div style={{fontSize:36}}>{showArchived?"📦":"👥"}</div><p style={{margin:"0.5rem 0 0",fontSize:13}}>{showArchived?"Aucun salarié archivé":"Aucun salarié actif"}</p></div>
              :list.map((emp,i)=>{
                const bg=COLS[i%COLS.length];const isE=editId===emp.id;const contrat=ct(emp.contractType);
                return(
                  <div key={emp.id} style={{padding:"0.9rem 1.5rem",borderBottom:i<list.length-1?"1px solid #EDF2F7":"none",display:"flex",alignItems:"center",gap:14,background:isE?`${MAG}06`:emp.archived?"#FAFAFA":"transparent",borderLeft:isE?`3px solid ${MAG}`:emp.archived?"3px solid #E2E8F0":"3px solid transparent",opacity:emp.archived?0.7:1}}>
                    {emp.photo
                      ?<div style={{width:44,height:44,borderRadius:"50%",overflow:"hidden",flexShrink:0,border:`2px solid ${bg}30`,filter:emp.archived?"grayscale(1)":"none"}}><img src={emp.photo} style={{width:"100%",height:"100%",objectFit:"cover"}}/></div>
                      :<Avatar name={emp.name} size={44} bg={`${bg}18`} color={bg}/>
                    }
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:700,color:emp.archived?"#718096":"#1A202C",fontSize:15}}>{emp.name}{emp.archived&&<span style={{fontSize:10,background:"#EDF2F7",color:"#718096",borderRadius:4,padding:"1px 6px",marginLeft:6,fontWeight:700}}>ARCHIVÉ</span>}</div>
                      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:3}}>
                        {emp.contractType&&<span style={{fontSize:11,background:contrat.bg,color:contrat.color,borderRadius:5,padding:"1px 8px",fontWeight:700}}>{contrat.label}</span>}
                        {emp.entryDate&&<span style={{fontSize:11,background:"#EDF2F7",color:"#4A5568",borderRadius:5,padding:"1px 8px",fontWeight:600}}>📅 {fmtDate(emp.entryDate)}</span>}
                        {emp.email&&<span style={{fontSize:11,background:"#EBF8FF",color:"#2B6CB0",borderRadius:5,padding:"1px 8px",fontWeight:600}}>✉ {emp.email}</span>}
                        {emp.phone&&<span style={{fontSize:11,background:"#F0FFF4",color:"#276749",borderRadius:5,padding:"1px 8px",fontWeight:600}}>📱 {emp.phone}</span>}
                        <span style={{fontSize:11,background:emp.mealType==="panier"?"#FFFAF0":"#EBF8FF",color:emp.mealType==="panier"?"#B7791F":"#2B6CB0",borderRadius:5,padding:"1px 8px",fontWeight:700}}>{emp.mealType==="panier"?"🧺 Panier":"🎟 Ticket"}</span>
                        <span style={{fontSize:11,background:"#EDF2F7",color:"#4A5568",borderRadius:5,padding:"1px 8px",fontWeight:700,letterSpacing:2}}>PIN ••••</span>
                      </div>
