// ── PANEL MESSAGES (SMS + Email via SpotHit) ──────────────────────────────────
function MessagesPanel({employees}){
  const actifs=employees.filter(e=>!e.archived);
  const[channel,setChannel]=useState("sms");
  const[selected,setSelected]=useState([]);
  const[message,setMessage]=useState("");
  const[subject,setSubject]=useState("");
  const[sending,setSending]=useState(false);
  const[result,setResult]=useState(null);

  function toggleAll(){
    const eligible=actifs.filter(e=>channel==="sms"?e.phone:e.email);
    if(selected.length===eligible.length)setSelected([]);
    else setSelected(eligible.map(e=>e.id));
  }
  function toggleEmp(id){setSelected(s=>s.includes(id)?s.filter(x=>x!==id):[...s,id]);}

  const eligible=actifs.filter(e=>channel==="sms"?e.phone:e.email);
  const missing=actifs.filter(e=>channel==="sms"?!e.phone:!e.email);

  async function handleSend(){
    if(!selected.length){alert("Sélectionnez au moins un destinataire.");return;}
    if(!message.trim()){alert("Écrivez un message.");return;}
    if(channel==="email"&&!subject.trim()){alert("Ajoutez un objet.");return;}
    setSending(true);setResult(null);
    try{
      const recipients=selected.map(id=>{
        const emp=actifs.find(e=>e.id===id);
        return{name:emp.name,value:channel==="sms"?emp.phone:emp.email};
      });
      const ctrl=new AbortController();
      const tid=setTimeout(()=>ctrl.abort(),20000); // timeout 20s
      const r=await fetch(SCRIPT_URL,{
        method:"POST",
        headers:{"Content-Type":"text/plain"},
        body:JSON.stringify({secret:SECRET,action:"send_message",channel,recipients,message:message.trim(),subject:subject.trim()}),
        redirect:"follow",
        signal:ctrl.signal
      });
      clearTimeout(tid);
      const j=await r.json();
      setResult(j);
      if(j.ok){setMessage("");setSubject("");setSelected([]);}
    }catch(e){
      if(e.name==="AbortError")setResult({ok:false,error:"Délai dépassé — vérifiez votre connexion et réessayez."});
      else if(e.message==="Load failed"||e.message==="Failed to fetch")
        setResult({ok:false,error:"Connexion impossible à Apps Script. Vérifiez que le déploiement est bien publié (Déployer → Gérer les déploiements → Nouvelle version)."});
      else setResult({ok:false,error:e.message});
    }
    setSending(false);
  }

  return(
    <div style={{maxWidth:700,margin:"0 auto"}}>
      <Card style={{marginBottom:"1.25rem"}}>
        <div style={{fontWeight:800,color:NAVY,fontSize:15,marginBottom:"1rem"}}>💬 Envoyer un message</div>
        <div style={{display:"flex",gap:10,marginBottom:"1.25rem"}}>
          {[{id:"sms",icon:"📱",label:"SMS"},{id:"email",icon:"✉️",label:"Email"}].map(c=>(
            <button key={c.id} onClick={()=>{setChannel(c.id);setSelected([]);setResult(null);}}
              style={{flex:1,padding:"0.75rem",borderRadius:12,border:`2px solid ${channel===c.id?NAVY:"#E2E8F0"}`,background:channel===c.id?`${NAVY}08`:"#fff",fontWeight:700,fontSize:14,cursor:"pointer",color:channel===c.id?NAVY:"#718096",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
              <span>{c.icon}</span>{c.label}
            </button>
          ))}
        </div>

        <div style={{marginBottom:"1.25rem"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <label style={{fontSize:11,fontWeight:700,color:"#4A5568",letterSpacing:0.5,textTransform:"uppercase"}}>Destinataires</label>
            {eligible.length>0&&<button onClick={toggleAll} style={{background:"none",border:"none",color:NAVY,fontSize:12,fontWeight:700,cursor:"pointer"}}>
              {selected.length===eligible.length?"Tout désélectionner":"Tout sélectionner"}
            </button>}
          </div>
          {eligible.length===0?(
            <div style={{background:"#FFF5F5",border:"1.5px solid #FEB2B2",borderRadius:10,padding:"0.75rem 1rem",color:"#C53030",fontSize:13,fontWeight:600}}>
              ⚠️ Aucun salarié n'a de {channel==="sms"?"numéro de téléphone":"adresse email"} renseigné.
            </div>
          ):(
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {eligible.map(emp=>(
                <label key={emp.id} style={{display:"flex",alignItems:"center",gap:12,padding:"0.65rem 1rem",background:selected.includes(emp.id)?`${NAVY}08`:"#F7F9FC",borderRadius:10,border:`1.5px solid ${selected.includes(emp.id)?NAVY+"30":"transparent"}`,cursor:"pointer"}}>
                  <input type="checkbox" checked={selected.includes(emp.id)} onChange={()=>toggleEmp(emp.id)} style={{width:16,height:16,accentColor:NAVY}}/>
                  {emp.photo?<div style={{width:32,height:32,borderRadius:"50%",overflow:"hidden",flexShrink:0}}><img src={emp.photo} style={{width:"100%",height:"100%",objectFit:"cover"}}/></div>:<Avatar name={emp.name} size={32} fs={11}/>}
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:13,color:NAVY}}>{emp.name}</div>
                    <div style={{fontSize:11,color:"#718096"}}>{channel==="sms"?emp.phone:emp.email}</div>
                  </div>
                </label>
              ))}
            </div>
          )}
          {missing.length>0&&(
            <div style={{marginTop:8,fontSize:11,color:"#A0AEC0"}}>
              Sans {channel==="sms"?"téléphone":"email"} : {missing.map(e=>e.name).join(", ")}
            </div>
          )}
        </div>

        {channel==="email"&&(
          <Inp label="Objet" value={subject} onChange={e=>setSubject(e.target.value)} placeholder="Ex: Planning semaine du 24 mars"/>
        )}

        <div style={{marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
            <label style={{fontSize:11,fontWeight:700,color:"#4A5568",letterSpacing:0.5,textTransform:"uppercase"}}>Message</label>
            {channel==="sms"&&<span style={{fontSize:11,color:message.length>160?"#C53030":"#A0AEC0",fontWeight:600}}>{message.length}/160</span>}
          </div>
          <textarea value={message} onChange={e=>setMessage(e.target.value)}
            placeholder={channel==="sms"?"Votre SMS (160 caractères max)…":"Contenu de l'email…"}
            style={{width:"100%",padding:"0.75rem 1rem",borderRadius:10,border:"1.5px solid #E2E8F0",fontSize:14,outline:"none",resize:"vertical",minHeight:channel==="email"?120:80,boxSizing:"border-box",fontFamily:"inherit",color:"#1A202C"}}/>
        </div>

        {result&&(
          <div style={{background:result.ok?"#F0FFF4":"#FFF5F5",border:`1.5px solid ${result.ok?"#9AE6B4":"#FEB2B2"}`,borderRadius:10,padding:"0.75rem 1rem",fontSize:13,fontWeight:600,color:result.ok?"#276749":"#C53030",marginBottom:14}}>
            {result.ok?`✅ ${result.sent} message(s) envoyé(s) avec succès !`:`❌ Erreur : ${result.error||"Envoi échoué"}`}
          </div>
        )}

        <Btn onClick={handleSend} disabled={sending||!selected.length||!message.trim()||eligible.length===0}>
          {sending?"Envoi en cours…":`${channel==="sms"?"📱 Envoyer SMS":"✉️ Envoyer Email"} — ${selected.length} destinataire${selected.length>1?"s":""}`}
        </Btn>

        <div style={{marginTop:12,fontSize:11,color:"#A0AEC0",textAlign:"center"}}>
          {channel==="sms"?<>Envoi via <strong>SpotHit</strong> · Configurez votre clé API dans Apps Script</>:<>Envoi via <strong>Google MailApp</strong> · lié à votre compte Google</>}
        </div>
      </Card>
    </div>
  );
}

function PrimesPanel({employees,ym}){
  const key=`fp:primes:${ym}`;

  const[form,setForm]=useState({empId:"",type:"commission",amount:"",note:""});
  const[saving,setSaving]=useState(false);
  const[err,setErr]=useState("");

  useEffect(()=>{
    setLoading(true);
    sg(key).then(d=>{setPrimes((d||[]).filter(p=>!p.deleted));setLoading(false);}).catch(()=>setLoading(false));
  },[key]);

  const actifs=employees.filter(e=>!e.archived&&!e.deleted);

  async function addPrime(){
    if(!form.empId){setErr("Sélectionnez un salarié.");return;}
    if(!form.amount||isNaN(Number(form.amount))||Number(form.amount)<=0){setErr("Montant invalide.");return;}
    setSaving(true);setErr("");
    const entry={
      id:uuid("p"),
      empId:form.empId,
      type:form.type,
      amount:Number(form.amount),
      note:sanitize(form.note,200),
      date:new Date().toISOString().slice(0,10),
      ym,
      createdAt:Date.now(),
      updatedAt:Date.now()
    };
    const next=[...primes,entry];
    await ss(key,next);
    setPrimes(next);
    setForm({empId:"",type:"commission",amount:"",note:""});
    adminLog("PRIME_AJOUT",`${employees.find(e=>e.id===form.empId)?.name||form.empId} — ${pt(form.type).label} ${form.amount}€`);
    setSaving(false);
  }

    if(!window.confirm("Supprimer cette ligne ?"))return;

            <select value={form.empId} onChange={e=>{setForm(f=>({...f,empId:e.target.value}));setErr("");}}

          </div>
          <div>
            <label style={{display:"block",fontSize:11,fontWeight:700,color:"#4A5568",marginBottom:6,textTransform:"uppercase",letterSpacing:0.5}}>Type</label>
            <select value={form.type} onChange={e=>setForm(f=>({...f,type:e.target.value}))}
              style={{width:"100%",padding:"9px 12px",borderRadius:10,border:"1.5px solid #E2E8F0",fontSize:13,color:NAVY,background:"#fff",outline:"none"}}>
              {PRIME_TYPES.map(t=><option key={t.id} value={t.id}>{t.icon} {t.label}</option>)}

        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 2fr",gap:10,marginBottom:10}}>

          </div>
          <Inp label="Note / Motif" value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))} placeholder="Optionnel — ex: CA juillet, objectif atteint…"/>
        </div>
        <Btn onClick={addPrime} disabled={saving}>{saving?"Enregistrement…":"+ Ajouter"}</Btn>
      </Card>

      {/* Totaux du mois */}
      {primes.length>0&&(
        <Card style={{marginBottom:"1.25rem",background:`linear-gradient(135deg,${NAVY}08,${MAG}08)`}}>

              </div>
              <div style={{fontWeight:800,fontSize:15,color:t.color,whiteSpace:"nowrap"}}>{p.amount.toLocaleString("fr-FR",{minimumFractionDigits:2})} €</div>
              <button onClick={()=>delPrime(p.id)} style={{background:"#FFF5F5",border:"none",borderRadius:8,padding:"6px 10px",color:"#C53030",cursor:"pointer",fontSize:13,fontWeight:700,flexShrink:0}}>✕</button>

function AdminDash({employees:initEmp,onLogout,onEmpChange}){
  const[employees,setEmployees]=useState(initEmp);
  const[tab,setTab]=useState("heures");
  const[ym,setYm]=useState(getYM());
  const[allData,setAllData]=useState({});
  const[loading,setLoading]=useState(false);
  const[detailId,setDetailId]=useState(null);
  const[detailTab,setDetailTab]=useState("all");
  const[refreshTick,setRefreshTick]=useState(0);
  const[lastRefresh,setLastRefresh]=useState(null);
  const months=monthsSinceStart();

  function handleUpdate(next){setEmployees(next);onEmpChange(next);}

  async function restoreEmployees(){
    try{
      const fromSheets = await sg("fp:employees");
      const fromLocal = lsg("fp:employees");
      const best = (fromSheets&&fromSheets.length>0) ? fromSheets : (fromLocal&&fromLocal.length>0) ? fromLocal : null;
      if(best){
        setEmployees(best);
        onEmpChange(best);
        lss("fp:employees", best);
        ss("fp:employees", best);
        alert(`✅ ${best.length} salarié(s) restauré(s).`);
      } else {
        alert("⚠️ Aucune donnée trouvée dans Google Sheets ni en local.");
      }
    }catch(e){alert("❌ Erreur restauration : "+e.message);}
  }

  useEffect(()=>{
    if(tab!=="heures")return;
    setLoading(true);setDetailId(null);
    Promise.all(employees.map(emp=>sg(`fp:${emp.id}:${ym}`).then(d=>({id:emp.id,data:(d||[]).filter(e=>!e.deleted)}))))
      .then(res=>{const map={};res.forEach(r=>{map[r.id]=r.data;});setAllData(map);setLoading(false);setLastRefresh(new Date());});
  },[ym,tab,employees,refreshTick]);

  function eWork(id){return(allData[id]||[]).filter(e=>!e.deleted&&(e.type==="work"||!e.type));}
  function eForfait(id){return(allData[id]||[]).filter(e=>!e.deleted&&e.type==="forfait");}
  function eAbs(id){return(allData[id]||[]).filter(e=>!e.deleted&&e.type==="absence");}
  function eTotH(id){return eWork(id).reduce((s,e)=>s+calcH(e.startTime,e.endTime,e.breakMin),0);}
  function eTotAbs(id){return eAbs(id).reduce((s,e)=>s+Number(e.nbDays||1),0);}
  function countMealDays(id){
    const entries=allData[id]||[];
    const workEntries=entries.filter(e=>!e.deleted&&(e.type==="work"||!e.type));
    const forfaitEntries=entries.filter(e=>!e.deleted&&e.type==="forfait");
    const absEntries=entries.filter(e=>!e.deleted&&e.type==="absence");
    const absDates=new Set();
    absEntries.forEach(e=>{
      let cur=new Date(e.dateStart);
      const end=new Date(e.dateEnd||e.dateStart);
      while(cur<=end){absDates.add(cur.toISOString().slice(0,10));cur.setDate(cur.getDate()+1);}
    });
    // Heures normales > 6h
    const hoursByDate={};
    workEntries.forEach(e=>{
      if(!e.date)return;
      if(!hoursByDate[e.date])hoursByDate[e.date]=0;
      hoursByDate[e.date]+=calcH(e.startTime,e.endTime,e.breakMin);
    });
    const workDays=Object.entries(hoursByDate).filter(([date,h])=>h>6&&!absDates.has(date)).length;
    // Forfait jours : chaque entrée = 1 jour éligible (absence exclue)
    const forfaitDays=forfaitEntries.filter(e=>e.date&&!absDates.has(e.date)).length;
    return workDays+forfaitDays;
  }

  const grandH=employees.reduce((s,e)=>s+eTotH(e.id),0);
  const grandAbs=employees.reduce((s,e)=>s+eTotAbs(e.id),0);

  const totalTickets=employees.filter(e=>!e.archived&&(e.mealType||"ticket")==="ticket").reduce((s,e)=>s+countMealDays(e.id),0);
  const totalPaniers=employees.filter(e=>!e.archived&&e.mealType==="panier").reduce((s,e)=>s+countMealDays(e.id),0);

  const BACKUP_KEY = "fp:last_backup_date";

  // ── Force-sync localStorage → Sheets (corrige les données bloquées) ──────────
  const[syncing,setSyncing]=useState(false);
  async function forceSyncLocalToSheets(){
    if(!GS_READY){alert("Sheets non connecté.");return;}
    if(!window.confirm("Forcer la synchronisation de TOUTES les données locales vers Google Sheets ?\n\nCela enverra les données de cet appareil vers Sheets et les rendra visibles sur tous les appareils."))return;
    setSyncing(true);
    const keys=Object.keys(localStorage).filter(k=>k.startsWith("fp:"));
    let ok=0,errors=0;
    for(const key of keys){
      try{
        const value=lsg(key);
        if(value===null)continue;
        const r=await fetch(SCRIPT_URL,{
          method:"POST",headers:{"Content-Type":"text/plain"},
          body:JSON.stringify({secret:SECRET,action:"set",key,value}),
          redirect:"follow"
        });
        const j=await r.json();
        if(j.ok)ok++;else errors++;
      }catch(e){errors++;}
    }
    setSyncing(false);
    alert(`✅ Synchronisation terminée !\n\n• ${ok} clés envoyées vers Sheets\n• ${errors} erreurs\n\nActualisez l'app sur les autres appareils.`);
    adminLog("FORCE_SYNC",`${ok} clés synchronisées depuis ${navigator.userAgent.slice(0,40)}`);
  }
  async function backupAll(silent=false){
    const backup={version:1,date:new Date().toISOString(),employees,heures:{}};
    const months=monthsSinceStart();
    for(const emp of employees){
      backup.heures[emp.id]={};
      for(const m of months){
        const d=await sg(`fp:${emp.id}:${m}`);
        if(d&&d.length>0) backup.heures[emp.id][m]=d;
      }
    }
    const dateStr=new Date().toISOString().slice(0,10);

    if(GS_READY){
      fetch(SCRIPT_URL,{
        method:"POST",
        headers:{"Content-Type":"text/plain"},
        body:JSON.stringify({secret:SECRET,action:"full_backup",backup}),
        redirect:"follow"
      }).then(()=>console.log("✅ Sauvegarde envoyée à Google Sheets"))
        .catch(e=>console.warn("Sauvegarde Sheets échouée:",e));
    }

    if(!silent){
      const json=JSON.stringify(backup,null,2);
      const a=document.createElement("a");
      a.href=URL.createObjectURL(new Blob([json],{type:"application/json"}));
      a.download=`fermapro_backup_${dateStr}.json`;
      a.click();
      alert(`✅ Sauvegarde complète !\n\n• Fichier JSON téléchargé\n• Envoyée vers Google Sheets${GS_READY?"":" (non configuré)"}\n\nConservez le fichier JSON précieusement.`);
    } else {
      console.log("✅ Sauvegarde automatique effectuée :", dateStr);
    }
    lss(BACKUP_KEY, dateStr);
  }

  useEffect(()=>{
    const _now=new Date();
    const today=`${_now.getFullYear()}-${String(_now.getMonth()+1).padStart(2,"0")}-${String(_now.getDate()).padStart(2,"0")}`;
    const lastBackup = lsg(BACKUP_KEY);
    const h = new Date().getHours();
    if(lastBackup !== today && h >= 22){
      console.log("Sauvegarde automatique déclenchée (22h dépassées)");
      setTimeout(()=>backupAll(true), 3000);
    }
    const timer = setInterval(()=>{
      const now = new Date();
      const todayNow=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}-${String(now.getDate()).padStart(2,"0")}`;
      const lastB = lsg(BACKUP_KEY);
      if(now.getHours()===22 && now.getMinutes()===0 && lastB !== todayNow){
        console.log("Sauvegarde automatique 22h00");
        backupAll(true);
      }
    }, 60000);
    return ()=>clearInterval(timer);
  },[employees]);

  const[showBackupList,setShowBackupList]=useState(false);

  async function restoreFromFirebaseBackup(date){
    if(!window.confirm(`Restaurer la sauvegarde du ${date} ?\n\nToutes les données actuelles seront remplacées.`))return;
    try{
      const url=`${SCRIPT_URL}?secret=${SECRET}&action=restore&date=${date}`;
      const r=await fetch(url,{redirect:"follow"});
      const j=await r.json();
      if(!j.ok){alert("❌ Erreur: "+j.error);return;}
      const result=j.data;
      const empData=await sg("fp:employees");
      if(empData&&empData.length>0){
        setEmployees(empData);
        onEmpChange(empData);
        lss("fp:employees",empData);
      }
      alert(`✅ Restauration réussie !\n${result.employees} salariés et ${result.months} mois de données restaurés.`);
      setShowBackupList(false);
      setTab("heures");

  }

  async function restoreFromBackup(e){
    const file=e.target.files[0];
    if(!file)return;
    const text=await file.text();
    try{
      const backup=JSON.parse(text);
      if(!backup.employees||!backup.heures) throw new Error("Format invalide");
      await ss("fp:employees",backup.employees);
      setEmployees(backup.employees);
      onEmpChange(backup.employees);
      let count=0;
      for(const empId of Object.keys(backup.heures)){
        for(const m of Object.keys(backup.heures[empId])){
          await ss(`fp:${empId}:${m}`,backup.heures[empId][m]);
          count++;
        }
      }
      alert(`✅ Restauration réussie !\n${backup.employees.length} salariés et ${count} mois de données restaurés.\n\nDate de la sauvegarde : ${backup.date?.slice(0,10)||"inconnue"}`);
    }catch(err){
      alert("❌ Fichier invalide : "+err.message);
    }
    e.target.value="";
  }

  function exportCSV(){
    function getMondayOf(dateStr){
      const d=new Date(dateStr);const day=d.getDay();
      const diff=day===0?-6:1-day;
      const mon=new Date(d);mon.setDate(d.getDate()+diff);
      return mon.toISOString().slice(0,10);
    }
    function getWeekNum(d){
      const date=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
      const dayNum=date.getUTCDay()||7;date.setUTCDate(date.getUTCDate()+4-dayNum);
      const yearStart=new Date(Date.UTC(date.getUTCFullYear(),0,1));
      return Math.ceil((((date-yearStart)/86400000)+1)/7);
    }
    function fmtWeek(mondayStr){
      const[y,m,d]=mondayStr.split("-");
      const mon=new Date(Number(y),Number(m)-1,Number(d));
      const sun=new Date(mon);sun.setDate(mon.getDate()+6);
      const dd=n=>String(n).padStart(2,"0");
      return`S${getWeekNum(mon)} — ${dd(mon.getDate())}/${dd(mon.getMonth()+1)} au ${dd(sun.getDate())}/${dd(sun.getMonth()+1)}/${sun.getFullYear()}`;
    }
    function fmtHlabel(h){
      const hh=Math.floor(Math.abs(h)),mm=Math.round((Math.abs(h)-hh)*60);
      return`${h<0?"-":""}${hh}h${String(mm).padStart(2,"0")}`;
    }

    const byEmpWeek={};
    employees.forEach(emp=>{byEmpWeek[emp.id]={};});
    employees.forEach(emp=>{
      (allData[emp.id]||[]).forEach(e=>{
        if(e.type==="absence"){
          let cur=new Date(e.dateStart);const end=new Date(e.dateEnd||e.dateStart);
          while(cur<=end){
            const ds=cur.toISOString().slice(0,10);const mon=getMondayOf(ds);
            if(!byEmpWeek[emp.id][mon])byEmpWeek[emp.id][mon]={heures:0,absJours:0,absDetail:[]};
            byEmpWeek[emp.id][mon].absJours+=e.halfDay==="half"?0.5:1;
            byEmpWeek[emp.id][mon].absDetail.push(at(e.absType).label);
            cur.setDate(cur.getDate()+1);
          }
        } else {
          const mon=getMondayOf(e.date);
          if(!byEmpWeek[emp.id][mon])byEmpWeek[emp.id][mon]={heures:0,absJours:0,absDetail:[]};
          byEmpWeek[emp.id][mon].heures+=calcH(e.startTime,e.endTime,e.breakMin);
        }
      });
    });
    const allMondays=[...new Set(employees.flatMap(emp=>Object.keys(byEmpWeek[emp.id])))].sort();

    const sheet1=[
      [`RAPPORT HEBDOMADAIRE — ${fmtYM(ym).toUpperCase()}   |   Base : 35h/semaine`,"","","","","","",""],
      [""],
      ["Salarié","Semaine","Heures travaillées","Jours absence","Type(s) absence","Heures requises (35h)","Différence","Statut"],
    ];
    employees.forEach(emp=>{
      const weeks=byEmpWeek[emp.id];
      const weekKeys=allMondays.filter(m=>weeks[m]);
      if(weekKeys.length===0){
        sheet1.push([emp.name,"(aucune saisie)","0h00","","","35h00","-35h00","⚠ Manquant"]);
        return;
      }
      let totH=0,totReq=0,totDiff=0;
      weekKeys.forEach(mon=>{
        const w=weeks[mon];const h=w.heures;const absJ=w.absJours;
        const req=Math.max(0,35-(absJ*7));const diff=h-req;
        totH+=h;totReq+=req;totDiff+=diff;
        sheet1.push([emp.name,fmtWeek(mon),fmtHlabel(h),absJ>0?`${absJ}j`:"",[ ...new Set(w.absDetail)].join(", ")||"",fmtHlabel(req),fmtHlabel(diff),diff>0?"✓ Excédent":diff===0?"✓ Exact":"⚠ Déficit"]);
      });
      sheet1.push([emp.name,`TOTAL ${fmtYM(ym).toUpperCase()}`,fmtHlabel(totH),"","",fmtHlabel(totReq),fmtHlabel(totDiff),totDiff>=0?"✓ Excédent":"⚠ Déficit"]);
      sheet1.push([""]);
    });

    const sheet2=[
      [`DÉTAIL JOURNALIER — ${fmtYM(ym).toUpperCase()}`,"","","","","",""],
      [""],
      ["Salarié","Date","Jour","Type","Heure début","Heure fin","Pause (min)","Heures effectives","Chantier / Note","Détail absence","Jours absence"],
    ];
    employees.forEach(emp=>{
      const entries=(allData[emp.id]||[]).slice().sort((a,b)=>(a.date||a.dateStart).localeCompare(b.date||b.dateStart));
      if(entries.length===0){
        sheet2.push([emp.name,"(aucune saisie)","","","","","","","","",""]);
        return;
      }
      entries.forEach(e=>{
        const isAbs=e.type==="absence";
        const dateStr=e.date||e.dateStart;
        const[y,m,d]=dateStr.split("-");
        const dt=new Date(Number(y),Number(m)-1,Number(d));
        const jourLabel=DAYS_FR[dt.getDay()];
        if(isAbs){
          const typ=at(e.absType);
          const dateRange=e.dateEnd&&e.dateEnd!==e.dateStart?`${fmtDate(e.dateStart)} → ${fmtDate(e.dateEnd)}`:fmtDate(e.dateStart);
          sheet2.push([emp.name,dateRange,jourLabel,"Absence","","","","",e.note||"",typ.label,e.halfDay==="half"?"0.5":String(e.nbDays||1)]);
        } else {
          const h=calcH(e.startTime,e.endTime,e.breakMin);
          sheet2.push([emp.name,fmtDate(dateStr),jourLabel,"Travail",e.startTime,e.endTime,e.breakMin||"0",fmtHlabel(h),e.note||"","",""]);
        }
      });
      const totalH=(allData[emp.id]||[]).filter(e=>e.type==="work"||!e.type).reduce((s,e)=>s+calcH(e.startTime,e.endTime,e.breakMin),0);
      const totalAbs=(allData[emp.id]||[]).filter(e=>e.type==="absence").reduce((s,e)=>s+Number(e.nbDays||1),0);
      sheet2.push([emp.name,`TOTAL ${emp.name.toUpperCase()}`,""," ","","","",fmtHlabel(totalH),"","",totalAbs>0?`${totalAbs}j`:""]);
      sheet2.push([""]);
    });

    const wb=XLSX.utils.book_new();
    const ws1=XLSX.utils.aoa_to_sheet(sheet1);
    const ws2=XLSX.utils.aoa_to_sheet(sheet2);
    ws1["!cols"]=[{wch:22},{wch:36},{wch:20},{wch:14},{wch:28},{wch:22},{wch:14},{wch:14}];
    ws2["!cols"]=[{wch:22},{wch:32},{wch:8},{wch:10},{wch:12},{wch:12},{wch:12},{wch:18},{wch:28},{wch:22},{wch:14}];

    // ── Onglet 3 — Tickets & Paniers (seuil >6h, sans absences) ─────
    // Fonction locale de calcul corrigé
    function calcMealDaysForExport(empId){
      const entries=allData[empId]||[];
      const absEntries=entries.filter(e=>e.type==="absence");
      const absDates=new Set();
      absEntries.forEach(e=>{
        let cur=new Date(e.dateStart);const end=new Date(e.dateEnd||e.dateStart);
        while(cur<=end){absDates.add(cur.toISOString().slice(0,10));cur.setDate(cur.getDate()+1);}
      });
      const hoursByDate={};
      entries.filter(e=>e.type==="work"||!e.type).forEach(e=>{
        if(!e.date)return;
        if(!hoursByDate[e.date])hoursByDate[e.date]=0;
        hoursByDate[e.date]+=calcH(e.startTime,e.endTime,e.breakMin);
      });
      return Object.entries(hoursByDate).filter(([date,h])=>h>6&&!absDates.has(date)).length;
    }
    const sheet3=[
      [`TICKETS & PANIERS REPAS — ${fmtYM(ym).toUpperCase()}`,"","","",""],
      [`Période : ${fmtYM(ym)}   |   Règle : journée > 6h effectives sans absence = 1 ticket ou 1 panier`,"","","",""],
      [""],
      ["Salarié","Type d'avantage","Jours éligibles (>6h)","Nb tickets","Nb paniers"],
    ];
    let grandTotalTickets=0,grandTotalPaniers=0;
    employees.forEach(emp=>{
      const joursT=calcMealDaysForExport(emp.id);
      const type=emp.mealType||"ticket";
      const nbT=type==="ticket"?joursT:0;
      const nbP=type==="panier"?joursT:0;
      grandTotalTickets+=nbT;grandTotalPaniers+=nbP;
      sheet3.push([emp.name,type==="ticket"?"🎟 Ticket restaurant":"🧺 Panier repas",joursT,nbT||"",nbP||""]);
    });
    sheet3.push([""]);
    sheet3.push(["TOTAUX","",grandTotalTickets+grandTotalPaniers,grandTotalTickets,grandTotalPaniers]);
    const ws3=XLSX.utils.aoa_to_sheet(sheet3);
    ws3["!cols"]=[{wch:26},{wch:22},{wch:18},{wch:14},{wch:14}];

    XLSX.utils.book_append_sheet(wb,ws1,"Synthèse hebdo");
    XLSX.utils.book_append_sheet(wb,ws2,"Détail journalier");
    XLSX.utils.book_append_sheet(wb,ws3,"Tickets & Paniers");
    XLSX.writeFile(wb,`fermapro_${ym}.xlsx`);
    adminLog("EXPORT_ADMIN",`Export mensuel ${fmtYM(ym)} — ${employees.length} salariés`);
  }

  const dEmp=detailId?employees.find(e=>e.id===detailId):null;
  const dAll=detailId?(allData[detailId]||[]):[];
  const dWork=dAll.filter(e=>e.type==="work"||!e.type);
  const dAbs=dAll.filter(e=>e.type==="absence");
  const dH=detailId?eTotH(detailId):0;
  const dAbsDays=detailId?eTotAbs(detailId):0;
  const dShown=detailTab==="work"?dWork:detailTab==="absence"?dAbs:dAll;
  const TABS=[{id:"heures",icon:"📊",label:"Heures & Absences"},{id:"salaries",icon:"👥",label:"Salariés"},{id:"primes",icon:"💶",label:"Primes"},{id:"messages",icon:"💬",label:"Messages"},{id:"journal",icon:"📋",label:"Journal"}];

  return(
    <div style={{minHeight:"100vh",background:"#F4F6FA"}}>
      {showBackupList&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",padding:"1rem"}}>
          <div style={{background:"#fff",borderRadius:20,padding:"1.5rem",width:"100%",maxWidth:520,maxHeight:"80vh",overflowY:"auto",boxShadow:"0 24px 64px rgba(0,0,0,0.4)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1rem"}}>

              <button onClick={()=>setShowBackupList(false)} style={{background:"#FFF5F5",border:"none",borderRadius:8,padding:"6px 12px",color:"#C53030",cursor:"pointer",fontWeight:700}}>✕</button>
            </div>
            <p style={{color:"#718096",fontSize:13,marginBottom:"1rem"}}>Sauvegardes stockées dans Google Sheets — 60 derniers jours conservés.</p>
            {backupLoading?<div style={{textAlign:"center",padding:"2rem",color:"#718096"}}>Chargement…</div>:
            backupList.length===0?<div style={{textAlign:"center",padding:"2rem",color:"#A0AEC0"}}>Aucune sauvegarde trouvée.<br/><small>La première sera créée ce soir à 22h.</small></div>:(
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {backupList.map(b=>(
                  <div key={b.name} style={{background:"#F7F9FC",borderRadius:12,padding:"0.75rem 1rem",display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}}>

                    <button onClick={()=>restoreFromFirebaseBackup(b.date)}
                      style={{background:`${NAVY}10`,border:`1px solid ${NAVY}20`,borderRadius:9,padding:"6px 14px",fontSize:12,color:NAVY,cursor:"pointer",fontWeight:700,flexShrink:0}}>

                    </button>

              </div>

      <div style={{background:`linear-gradient(135deg,${NAVYDK},${NAVYLT})`,padding:"1.25rem 1.5rem 0"}}>
        <div style={{maxWidth:900,margin:"0 auto"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"1rem",flexWrap:"wrap",gap:8}}>
            <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
              <div style={{width:34,height:34,borderRadius:10,background:"rgba(255,255,255,0.15)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>📊</div>
              <div>
                <div style={{color:"rgba(255,255,255,0.5)",fontSize:10,fontWeight:700,letterSpacing:1}}>FERMAPRO · BACK OFFICE</div>
                <div style={{color:"#fff",fontWeight:800,fontSize:16}}>Administration</div>
              </div>
              {GS_READY&&(
                <div style={{display:"inline-flex",alignItems:"center",gap:4,background:loading?"rgba(246,173,85,0.2)":"rgba(72,187,120,0.2)",border:`1px solid ${loading?"rgba(246,173,85,0.4)":"rgba(72,187,120,0.4)"}`,borderRadius:10,padding:"3px 8px"}}>
                  <div style={{width:5,height:5,borderRadius:"50%",background:loading?"#F6AD55":"#68D391"}}/>
                  <span style={{color:loading?"#FEFCBF":"#C6F6D5",fontSize:9,fontWeight:700}}>{loading?"Chargement…":"Sheets connecté"}</span>

            </div>
          </div>
          <div style={{display:"flex",gap:2,overflowX:"auto",paddingBottom:2}}>
            {TABS.map(t=>(
              <button key={t.id} onClick={()=>setTab(t.id)} style={{background:tab===t.id?"#fff":"rgba(255,255,255,0.08)",color:tab===t.id?NAVY:"rgba(255,255,255,0.65)",border:"none",borderRadius:"8px 8px 0 0",padding:"8px 12px",fontSize:12,fontWeight:800,cursor:"pointer",display:"flex",alignItems:"center",gap:5,whiteSpace:"nowrap",flexShrink:0}}>
                <span>{t.icon}</span>{t.label}
                {t.id==="salaries"&&<span style={{background:tab===t.id?`${MAG}20`:"rgba(255,255,255,0.15)",color:tab===t.id?MAG:"rgba(255,255,255,0.7)",borderRadius:5,padding:"1px 6px",fontSize:10,fontWeight:800}}>{employees.length}</span>}
              </button>
            ))}
          </div>
        </div>
      </div>

      <div style={{padding:"1rem",maxWidth:900,margin:"0 auto",overflowX:"hidden",boxSizing:"border-box"}}>
        {tab==="salaries"?<EmpManager employees={employees} onUpdate={handleUpdate}/>:
        tab==="messages"?<MessagesPanel employees={employees}/>:
        tab==="primes"?<PrimesPanel employees={employees} ym={ym}/>:
        tab==="journal"?<JournalPanel/>:(
          <>
            <div style={{display:"flex",gap:10,marginBottom:"1.5rem",flexWrap:"wrap",alignItems:"center"}}>
              <select value={ym} onChange={e=>setYm(e.target.value)} style={{padding:"9px 14px",borderRadius:10,border:"1.5px solid #E2E8F0",fontSize:14,fontWeight:700,color:NAVY,background:"#fff",cursor:"pointer",outline:"none"}}>{months.map(m=><option key={m} value={m}>{fmtYM(m)}</option>)}</select>
              <button onClick={exportCSV} style={{background:NAVY,color:"#fff",border:"none",borderRadius:10,padding:"9px 18px",fontSize:13,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",gap:8}}>📥 Exporter Excel</button>
              <button onClick={()=>setRefreshTick(t=>t+1)} disabled={loading} style={{background:"#EBF8FF",color:"#2B6CB0",border:"1.5px solid #BEE3F8",borderRadius:10,padding:"9px 14px",fontSize:13,fontWeight:700,cursor:loading?"wait":"pointer",display:"flex",alignItems:"center",gap:6}}>
                {loading?"⟳ Chargement…":"🔄 Actualiser"}
              </button>
              {lastRefresh&&<span style={{fontSize:11,color:"#A0AEC0",fontWeight:600,display:"flex",alignItems:"center"}}>Màj {lastRefresh.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"})}</span>}
              {detailId&&<button onClick={()=>{setDetailId(null);setDetailTab("all");}} style={{background:`${MAG}12`,color:MAG,border:`1.5px solid ${MAG}30`,borderRadius:10,padding:"9px 14px",fontSize:13,fontWeight:700,cursor:"pointer"}}>← Retour</button>}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:"1rem"}}>
              {[{v:fmtH(grandH),l:"Total heures",c:NAVY},{v:`${grandAbs}j`,l:"Total absences",c:"#C53030"},{v:active,l:"Salariés actifs",c:MAG}].map(({v,l,c})=>(
                <div key={l} style={{background:"#fff",borderRadius:14,padding:"0.85rem 0.5rem",textAlign:"center",boxShadow:"0 2px 10px rgba(0,0,0,0.06)",borderTop:`3px solid ${c}`,minWidth:0}}>
                  <div style={{fontSize:20,fontWeight:800,color:c,wordBreak:"break-all"}}>{v}</div>
                  <div style={{fontSize:9,color:"#718096",marginTop:4,fontWeight:700,letterSpacing:0.3}}>{l.toUpperCase()}</div>
                </div>
              ))}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:"1rem"}}>
              <div style={{background:"#fff",borderRadius:14,padding:"0.85rem 1rem",boxShadow:"0 2px 10px rgba(0,0,0,0.06)",borderTop:"3px solid #2B6CB0",display:"flex",alignItems:"center",gap:10,minWidth:0}}>
                <div style={{fontSize:24,flexShrink:0}}>🎟</div>
                <div style={{minWidth:0}}><div style={{fontSize:20,fontWeight:800,color:"#2B6CB0"}}>{totalTickets}</div><div style={{fontSize:9,color:"#718096",fontWeight:700,letterSpacing:0.3}}>TICKETS</div></div>
              </div>
              <div style={{background:"#fff",borderRadius:14,padding:"0.85rem 1rem",boxShadow:"0 2px 10px rgba(0,0,0,0.06)",borderTop:"3px solid #B7791F",display:"flex",alignItems:"center",gap:10,minWidth:0}}>
                <div style={{fontSize:24,flexShrink:0}}>🧺</div>
                <div style={{minWidth:0}}><div style={{fontSize:20,fontWeight:800,color:"#B7791F"}}>{totalPaniers}</div><div style={{fontSize:9,color:"#718096",fontWeight:700,letterSpacing:0.3}}>PANIERS</div></div>
              </div>
            </div>

            {loading?<Spinner/>:!detailId?(
              <Card style={{padding:0,overflow:"hidden"}}>
                <div style={{padding:"1.1rem 1.5rem",borderBottom:"1px solid #EDF2F7",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontWeight:800,color:NAVY,fontSize:15}}>Synthèse — {fmtYM(ym)}</span>
                  <Badge color={NAVY}>{employees.length} salariés</Badge>
                </div>
                {employees.map((emp,i)=>{
                  const th=eTotH(emp.id),ta=eTotAbs(emp.id),pct=grandH>0?(th/grandH)*100:0;
                  return(
                    <div key={emp.id} onClick={()=>setDetailId(emp.id)} style={{padding:"1rem 1.5rem",borderBottom:i<employees.length-1?"1px solid #EDF2F7":"none",display:"flex",alignItems:"center",gap:14,cursor:"pointer"}} onMouseEnter={e=>e.currentTarget.style.background="#F7FAFC"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                      <Avatar name={emp.name} size={42}/>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontWeight:700,color:"#1A202C",fontSize:15,marginBottom:5}}>{emp.name}</div>
                        <div style={{height:4,background:"#EDF2F7",borderRadius:5,overflow:"hidden",marginBottom:6}}><div style={{width:`${pct}%`,height:"100%",background:`linear-gradient(90deg,${MAG},${MAGLT})`,borderRadius:5}}/></div>
                        {ta>0&&<div style={{display:"flex",gap:5,flexWrap:"wrap"}}>{ABS.filter(a=>eAbs(emp.id).some(e=>e.absType===a.id)).map(a=>{const n=eAbs(emp.id).filter(e=>e.absType===a.id).reduce((s,e)=>s+Number(e.nbDays||1),0);return<span key={a.id} style={{fontSize:11,background:a.bg,color:a.color,borderRadius:5,padding:"1px 7px",fontWeight:700}}>{a.icon} {n}j</span>;})}</div>}
                      </div>
                      <div style={{textAlign:"right",minWidth:90}}>
                        <div style={{fontWeight:800,fontSize:17,color:th>0?MAG:"#CBD5E0"}}>{fmtH(th)}</div>
                        {ta>0&&<div style={{fontSize:12,color:"#C53030",fontWeight:700,marginTop:2}}>{ta}j abs.</div>}
                        <div style={{fontSize:11,color:"#A0AEC0"}}>{eWork(emp.id).length}j trav.</div>
                      </div>
                      <span style={{color:"#CBD5E0",fontSize:20}}>›</span>
                    </div>
                  );
                })}
                <div style={{padding:"1rem 1.5rem",background:`linear-gradient(135deg,${NAVY}08,${MAG}05)`,borderTop:"2px solid #EDF2F7",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div><div style={{fontWeight:800,color:NAVY,fontSize:14}}>TOTAL ENTREPRISE</div>{grandAbs>0&&<div style={{fontSize:12,color:"#C53030",fontWeight:700}}>{grandAbs} j. absence</div>}</div>
                  <span style={{fontWeight:800,color:NAVY,fontSize:20}}>{fmtH(grandH)}</span>
                </div>
              </Card>
            ):(
              <Card style={{padding:0,overflow:"hidden"}}>
                <div style={{padding:"1.25rem 1.5rem",background:`linear-gradient(135deg,${NAVY}08,${MAG}05)`,borderBottom:"1px solid #EDF2F7"}}>
                  <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:dAbs.length>0?12:0}}>
                    <Avatar name={dEmp.name} size={48}/>
                    <div style={{flex:1}}><div style={{fontWeight:800,color:NAVY,fontSize:17}}>{dEmp.name}</div><div style={{color:"#718096",fontSize:13}}>{fmtYM(ym)}</div></div>
                    <div style={{textAlign:"right"}}><div style={{fontWeight:800,fontSize:22,color:MAG}}>{fmtH(dH)}</div>{dAbsDays>0&&<div style={{fontSize:13,color:"#C53030",fontWeight:700}}>{dAbsDays}j absence</div>}</div>
                  </div>
                  {dAbs.length>0&&<div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{ABS.filter(a=>dAbs.some(e=>e.absType===a.id)).map(a=>{const n=dAbs.filter(e=>e.absType===a.id).reduce((s,e)=>s+Number(e.nbDays||1),0);return<span key={a.id} style={{fontSize:12,background:a.bg,color:a.color,borderRadius:8,padding:"4px 10px",fontWeight:700,border:`1px solid ${a.color}30`}}>{a.icon} {a.label} · {n}j</span>;})}</div>}
                </div>
                <div style={{padding:"0.75rem 1.5rem",borderBottom:"1px solid #EDF2F7",display:"flex",gap:8,flexWrap:"wrap"}}>
                  {[{v:"all",l:"Tout"},{v:"work",l:`⏱ Heures (${dWork.length})`},{v:"absence",l:`📅 Absences (${dAbs.length})`}].map(t=>(
                    <button key={t.v} onClick={()=>setDetailTab(t.v)} style={{background:detailTab===t.v?NAVY:"transparent",color:detailTab===t.v?"#fff":"#718096",border:`1.5px solid ${detailTab===t.v?NAVY:"#E2E8F0"}`,borderRadius:8,padding:"4px 12px",fontSize:12,cursor:"pointer",fontWeight:700}}>{t.l}</button>
                  ))}
                </div>
                {dShown.length===0?<div style={{textAlign:"center",padding:"3rem",color:"#A0AEC0"}}><div style={{fontSize:40}}>📭</div><p>Aucune entrée</p></div>:(
                  <>
                    <div style={{padding:"0.6rem 1.5rem",background:"#F7F9FC",borderBottom:"1px solid #EDF2F7",display:"grid",gridTemplateColumns:"1.2fr 1fr 1.5fr 80px",gap:8}}>
                      {["Date","Type","Détail","Durée"].map(h=><div key={h} style={{fontSize:11,fontWeight:700,color:"#A0AEC0",letterSpacing:0.5}}>{h.toUpperCase()}</div>)}
                    </div>
                    {dShown.map((entry,i)=>{
                      const isAbs=entry.type==="absence";const typ=isAbs?at(entry.absType):null;const h=isAbs?null:calcH(entry.startTime,entry.endTime,entry.breakMin);
                      return(
                        <div key={entry.id} style={{padding:"0.9rem 1.5rem",borderBottom:i<dShown.length-1?"1px solid #EDF2F7":"none",display:"grid",gridTemplateColumns:"1.2fr 1fr 1.5fr 80px",gap:8,alignItems:"center"}} onMouseEnter={e=>e.currentTarget.style.background="#F7FAFC"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                          <div style={{fontWeight:700,fontSize:13,color:"#1A202C"}}>{fmtDate(entry.date||entry.dateStart)}</div>
                          {isAbs?<Badge color={typ.color} bg={typ.bg}>{typ.icon} {typ.label}</Badge>:<span style={{fontSize:12,background:`${MAG}12`,color:MAG,borderRadius:6,padding:"2px 8px",fontWeight:700,display:"inline-block"}}>⏱ Travail</span>}
                          <div style={{fontSize:12,color:"#718096"}}>
                            {isAbs?<>{entry.halfDay==="half"?"½ journée":(entry.dateEnd&&entry.dateEnd!==entry.dateStart?`→ ${fmtDate(entry.dateEnd)}`:"")}{entry.note&&<div style={{fontStyle:"italic",color:"#A0AEC0",marginTop:1,fontSize:11}}>"{entry.note}"</div>}</>
                            :<>{entry.startTime}–{entry.endTime}{Number(entry.breakMin)>0&&<span style={{color:"#CBD5E0"}}> p.{entry.breakMin}min</span>}{entry.note&&<div style={{fontStyle:"italic",color:"#A0AEC0",marginTop:1,fontSize:11}}>{entry.note}</div>}</>}
                          </div>
                          <div style={{fontWeight:800,fontSize:15,color:isAbs?typ.color:MAG,textAlign:"right"}}>{isAbs?`${entry.nbDays||1}j`:fmtH(h)}</div>
                        </div>
                      );
                    })}
                    <div style={{padding:"1rem 1.5rem",background:`${NAVY}05`,borderTop:`2px solid ${NAVY}15`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div style={{display:"flex",gap:18}}>
                        <div><span style={{fontWeight:600,color:"#718096",fontSize:12}}>Heures : </span><span style={{fontWeight:800,color:MAG,fontSize:15}}>{fmtH(dH)}</span></div>
                        {dAbsDays>0&&<div><span style={{fontWeight:600,color:"#718096",fontSize:12}}>Absences : </span><span style={{fontWeight:800,color:"#C53030",fontSize:15}}>{dAbsDays}j</span></div>}
                      </div>
                      <span style={{fontSize:12,color:"#A0AEC0",fontWeight:600}}>{dAll.length} entrée{dAll.length>1?"s":""}</span>
                    </div>
                  </>
                )}
              </Card>
            )}
          </>
        )}
      </div>
    </div>
  );
}

// ── ROOT ──────────────────────────────────────────────────────────────────────
// ── #2 — TIMEOUT SESSION ─────────────────────────────────────────────────────
// Constante : 30 minutes d'inactivité → déconnexion automatique
const SESSION_TIMEOUT_MS = 30 * 60 * 1000;

function App(){
  const[view,setView]=useState("loading");
  const[employee,setEmployee]=useState(null);
  const[employees,setEmployees]=useState([]);
  const[sessionWarning,setSessionWarning]=useState(false);
  const sessionTimer=React.useRef(null);
  const warningTimer=React.useRef(null);

  // #2 — Réinitialiser le timer à chaque activité utilisateur
  const resetSessionTimer=React.useCallback(()=>{
    if(sessionTimer.current) clearTimeout(sessionTimer.current);
    if(warningTimer.current) clearTimeout(warningTimer.current);
    setSessionWarning(false);
    // Avertissement 5 min avant expiration
    warningTimer.current=setTimeout(()=>setSessionWarning(true), SESSION_TIMEOUT_MS - 5*60*1000);
    // Déconnexion automatique
    sessionTimer.current=setTimeout(()=>{
      setEmployee(null);
      setView("landing");
      setSessionWarning(false);
      console.log("⏱ Session expirée — déconnexion automatique");
    }, SESSION_TIMEOUT_MS);
  },[]);

  // Démarrer le timer seulement si une session est active (salarié ou admin)
  useEffect(()=>{
    const isActive=view==="empDash"||view==="adminDash";
    if(isActive){
      resetSessionTimer();
      const events=["mousedown","keydown","touchstart","scroll","click"];
      const handler=()=>resetSessionTimer();
      events.forEach(e=>window.addEventListener(e,handler,{passive:true}));
      return()=>{
        events.forEach(e=>window.removeEventListener(e,handler));
        if(sessionTimer.current) clearTimeout(sessionTimer.current);
        if(warningTimer.current) clearTimeout(warningTimer.current);
        setSessionWarning(false);
      };
    }
  },[view,resetSessionTimer]);

  useEffect(()=>{
    // R4 — Vider la retry queue au démarrage
    if(GS_READY) retryQueueFlush().catch(()=>{});
    sg("fp:employees").then(data=>{
      if(data&&data.length>0){
        setEmployees(data);
        lss("fp:employees", data);
      } else {
        setEmployees(INIT_EMP);
        ss("fp:employees", INIT_EMP);
      }
      setView("landing");
    }).catch(()=>{
      const local = lsg("fp:employees");
      setEmployees(local&&local.length>0 ? local : INIT_EMP);
      setView("landing");
    });
  },[]);

  const go=v=>setView(v);

  if(view==="loading") return(
    <div style={{minHeight:"100vh",background:`linear-gradient(155deg,${NAVYDK},${NAVYLT})`,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:20}}>
      <div style={{width:60,height:60,borderRadius:20,background:MAG,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:`0 12px 40px ${MAG}60`}}>
        <svg width="34" height="34" viewBox="0 0 42 42" fill="none"><path d="M13 21.5l5 5 11-11" stroke="#fff" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
      </div>
      <div style={{width:36,height:36,border:"3px solid rgba(255,255,255,0.2)",borderTop:"3px solid #fff",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
      <p style={{color:"rgba(255,255,255,0.5)",fontSize:13,margin:0}}>Chargement…</p>
    </div>
  );

  // #2 — Bandeau d'avertissement session expirante
  const SessionWarningBanner=()=>sessionWarning?(
    <div style={{position:"fixed",top:0,left:0,right:0,zIndex:9999,background:"#B7791F",padding:"10px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}}>
      <span style={{color:"#fff",fontWeight:700,fontSize:13}}>⏱ Votre session expire dans 5 minutes par mesure de sécurité.</span>
      <button onClick={resetSessionTimer} style={{background:"rgba(255,255,255,0.2)",border:"1px solid rgba(255,255,255,0.4)",borderRadius:8,padding:"5px 14px",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer"}}>
        Rester connecté
      </button>
    </div>
  ):null;

  if(view==="setup")     return<FirebaseSetup/>;
  if(view==="landing")   return<Landing onEmployee={()=>go("empLogin")} onAdmin={()=>go("adminLogin")} fbReady={FB_READY}/>;
  if(view==="empLogin")  return<EmpLogin employees={employees} onLogin={e=>{setEmployee(e);go("empDash");}} onBack={()=>go("landing")} onEmpUpdate={(emp,all)=>{setEmployee(emp);if(all)setEmployees(all);}}/>;
  if(view==="empDash")   return<><SessionWarningBanner/><EmpDash employee={employee} employees={employees} onLogout={()=>{setEmployee(null);go("landing");}} onEmpUpdate={emp=>{setEmployee(emp);setEmployees(prev=>prev.map(e=>e.id===emp.id?emp:e));}}/></>;
  if(view==="adminLogin")return<AdminLogin onLogin={()=>go("adminDash")} onBack={()=>go("landing")}/>;
  if(view==="adminDash") return<><SessionWarningBanner/><AdminDash employees={employees} onLogout={()=>go("landing")} onEmpChange={setEmployees}/></>;
  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
