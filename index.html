<script>
// 🔧 REMPLIR avec l'URL de votre déploiement Apps Script
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx_DWRRrchuJUTYKFQpqJSm0dk8ATlsmX2o4Gffc4dPzuyl34Ey0MlanY3XDFZQXbbqyw/exec";
const SECRET     = "fermapro_secret_2024";

// ── localStorage — cache local immédiat, toujours disponible ─────────────────
function lsg(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}}
function lss(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

// ── Indicateur connexion ──────────────────────────────────────────────────────
const GS_READY = SCRIPT_URL && SCRIPT_URL !== "VOTRE_APPS_SCRIPT_URL";

// ── Lecture depuis Apps Script (GET — pas de problème CORS) ──────────────────
async function sg(k){
  if(GS_READY){
    try{
      const url=`${SCRIPT_URL}?secret=${SECRET}&action=get&key=${encodeURIComponent(k)}`;
      const r=await fetch(url,{redirect:"follow"});
      const j=await r.json();
      if(j.ok && j.data!==null){
        lss(k,j.data); // mise à jour cache local
        return j.data;
      }
    }catch(e){console.warn("sg Apps Script error, using local cache",e);}
  }
  return lsg(k); // fallback local
}

// ── Écriture vers Apps Script (POST text/plain — pas de preflight CORS) ──────
async function ss(k,v){
  lss(k,v); // localStorage IMMÉDIAT — toujours fiable
  if(!GS_READY)return;
  try{
    fetch(SCRIPT_URL,{
      method:"POST",
      headers:{"Content-Type":"text/plain"}, // simple request, pas de preflight
      body:JSON.stringify({secret:SECRET,action:"set",key:k,value:v}),
      redirect:"follow"
    }).catch(e=>console.warn("ss async error",e));
  }catch(e){console.warn("ss error",e);}
}

// ── Alias compatibilité ───────────────────────────────────────────────────────
function keyToPath(k){return k;}
const FB_READY=GS_READY;
const FS_BASE=null; // plus utilisé

console.log(GS_READY?"✅ Google Sheets Apps Script prêt":"⚠️ Mode local — configurez SCRIPT_URL");
</script>

function fmtDate(s){if(!s)return"";const[y,m,d]=s.split("-");const dt=new Date(Number(y),Number(m)-1,Number(d));return`${DAYS_FR[dt.getDay()]} ${d}/${m}/${y}`;}

      <Inp label="Pause (min)" type="number" min="0" max="240" value={form.breakMin} onChange={e=>set("breakMin")(e.target.value)}/>
      <Inp label="Note / Chantier" value={form.note} onChange={e=>set("note")(e.target.value)} placeholder="Optionnel"/>
      {h>0&&<div style={{background:`linear-gradient(135deg,${NAVY}10,${MAG}10)`,borderRadius:12,padding:"0.85rem 1rem",marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"center",border:`1px solid ${MAG}20`}}><span style={{color:"#4A5568",fontSize:14,fontWeight:600}}>⏱ Temps effectif</span><span style={{color:MAG,fontWeight:800,fontSize:20}}>{fmtH(h)}</span></div>}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <Btn variant="outline" onClick={onCancel}>Annuler</Btn>
        <Btn onClick={()=>onSave({...form,type:"work"})} disabled={!form.date||h<=0}>Enregistrer</Btn>
      </div>
    </Card>
  );
}

// ── FORM ABSENCE ──────────────────────────────────────────────────────────────

              <span style={{fontSize:17,flexShrink:0}}>{a.icon}</span>

          {[{v:"full",l:"Journée(s)"},{v:"half",l:"Demi-journée"}].map(o=>(

          <Inp label="Date début" type="date" value={form.dateStart} onChange={e=>set("dateStart")(e.target.value)}/>
          <Inp label="Date fin" type="date" value={form.dateEnd||form.dateStart} onChange={e=>set("dateEnd")(e.target.value)}/>
         </div>

      <Inp label="Commentaire (optionnel)" value={form.note} onChange={e=>set("note")(e.target.value)} placeholder="Médecin, destination, motif…"/>
      <div style={{background:typ.bg,border:`1.5px solid ${typ.color}30`,borderRadius:12,padding:"0.85rem 1rem",marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:20}}>{typ.icon}</span><span style={{color:typ.color,fontWeight:700,fontSize:14}}>{typ.label}</span></div>

        <Btn variant="outline" onClick={onCancel}>Annuler</Btn>

// ── TABLEAU DE BORD SALARIÉ ───────────────────────────────────────────────────
function EmpDash({employee,onLogout}){
  const[entries,setEntries]=useState([]);
  const[loading,setLoading]=useState(true);
  const[saving,setSaving]=useState(false);
  const[ym,setYm]=useState(getYM());
  const[mode,setMode]=useState(null);
  const[editEntry,setEditEntry]=useState(null);
  const[filter,setFilter]=useState("all");
  const[showProfile,setShowProfile]=useState(false);
  const months=monthRange(2);
  const key=`fp:${employee.id}:${ym}`;

  // ── Export Excel personnel (6 derniers mois) ──────────────────────────────
  function exportMyXLSX(){
    function getMondayOf(ds){const d=new Date(ds);const day=d.getDay();const diff=day===0?-6:1-day;const m=new Date(d);m.setDate(d.getDate()+diff);return m.toISOString().slice(0,10);}
    function getWeekNum(d){const dt=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));const dn=dt.getUTCDay()||7;dt.setUTCDate(dt.getUTCDate()+4-dn);const y=new Date(Date.UTC(dt.getUTCFullYear(),0,1));return Math.ceil((((dt-y)/86400000)+1)/7);}
    function fmtWeek(mon){const[y,m,d]=mon.split("-");const mo=new Date(Number(y),Number(m)-1,Number(d));const su=new Date(mo);su.setDate(mo.getDate()+6);const p=n=>String(n).padStart(2,"0");return`S${getWeekNum(mo)} — ${p(mo.getDate())}/${p(mo.getMonth()+1)} au ${p(su.getDate())}/${p(su.getMonth()+1)}/${su.getFullYear()}`;}
    function fmtHL(h){const hh=Math.floor(Math.abs(h)),mm=Math.round((Math.abs(h)-hh)*60);return`${h<0?"-":""}${hh}h${String(mm).padStart(2,"0")}`;}

    // Charger les 6 derniers mois depuis Firebase
    Promise.all(monthRange(5).map(m=>sg(`fp:${employee.id}:${m}`).then(d=>d||[]))).then(results=>{
      const all=results.flat();
      if(!all.length){alert("Aucune donnée à exporter.");return;}

      // ── Onglet 1 : Synthèse hebdo ──────────────────────────────────────────
      const wm={};
      all.forEach(e=>{
        if(e.type==="absence"){
          let c=new Date(e.dateStart);const en=new Date(e.dateEnd||e.dateStart);
          while(c<=en){const ds=c.toISOString().slice(0,10);const mo=getMondayOf(ds);if(!wm[mo])wm[mo]={h:0,aj:0,ad:[]};wm[mo].aj+=e.halfDay==="half"?0.5:1;wm[mo].ad.push(at(e.absType).label);c.setDate(c.getDate()+1);}
        } else {const mo=getMondayOf(e.date);if(!wm[mo])wm[mo]={h:0,aj:0,ad:[]};wm[mo].h+=calcH(e.startTime,e.endTime,e.breakMin);}
      });
      const mondays=Object.keys(wm).sort();
      const contratInfo=ct(employee.contractType);

      const sheet1=[
        [`MES HEURES — ${employee.name.toUpperCase()}`,"","","","","",""],
        [`Contrat : ${contratInfo.label||"—"}   |   Entrée : ${employee.entryDate?fmtDate(employee.entryDate):"—"}   |   Base : 35h/semaine`],
        [""],
        ["Semaine","Heures travaillées","Jours absence","Type(s) absence","Heures requises (35h)","Différence","Statut"],
      ];
      let tH=0,tR=0,tD=0;
      mondays.forEach(mo=>{
        const w=wm[mo];const h=w.h;const aj=w.aj;
        const req=Math.max(0,35-(aj*7));const diff=h-req;
        tH+=h;tR+=req;tD+=diff;
        sheet1.push([fmtWeek(mo),fmtHL(h),aj>0?`${aj}j`:"",[ ...new Set(w.ad)].join(", ")||"",fmtHL(req),fmtHL(diff),diff>0?"✓ Excédent":diff===0?"✓ Exact":"⚠ Déficit"]);
      });
      sheet1.push(["TOTAL GÉNÉRAL",fmtHL(tH),"","",fmtHL(tR),fmtHL(tD),tD>=0?"✓ Excédent":"⚠ Déficit"]);

      // ── Onglet 2 : Détail journalier ───────────────────────────────────────
      const sheet2=[
        [`DÉTAIL JOURNALIER — ${employee.name.toUpperCase()}`],
        [""],
        ["Date","Jour","Type","Heure début","Heure fin","Pause (min)","Heures effectives","Chantier / Note","Type absence","Jours abs."],
      ];
      all.slice().sort((a,b)=>(a.date||a.dateStart).localeCompare(b.date||b.dateStart)).forEach(e=>{
        const isA=e.type==="absence";
        const ds=e.date||e.dateStart;const[y,m,d]=ds.split("-");
        const jour=DAYS_FR[new Date(Number(y),Number(m)-1,Number(d)).getDay()];
        if(isA){const typ=at(e.absType);const dr=e.dateEnd&&e.dateEnd!==e.dateStart?`${fmtDate(e.dateStart)} → ${fmtDate(e.dateEnd)}`:fmtDate(e.dateStart);sheet2.push([dr,jour,"Absence","","","","",e.note||"",typ.label,e.halfDay==="half"?"0.5":String(e.nbDays||1)]);}
        else{sheet2.push([fmtDate(ds),jour,"Travail",e.startTime,e.endTime,e.breakMin||"0",fmtHL(calcH(e.startTime,e.endTime,e.breakMin)),e.note||"","",""]);}
      });

      // ── Génération ─────────────────────────────────────────────────────────
      const wb=XLSX.utils.book_new();
      const ws1=XLSX.utils.aoa_to_sheet(sheet1);
      const ws2=XLSX.utils.aoa_to_sheet(sheet2);
      ws1["!cols"]=[{wch:36},{wch:20},{wch:13},{wch:28},{wch:22},{wch:14},{wch:14}];
      ws2["!cols"]=[{wch:30},{wch:8},{wch:10},{wch:12},{wch:12},{wch:12},{wch:18},{wch:26},{wch:22},{wch:12}];
      XLSX.utils.book_append_sheet(wb,ws1,"Synthèse hebdo");
      XLSX.utils.book_append_sheet(wb,ws2,"Détail journalier");
      XLSX.writeFile(wb,`mes_heures_${employee.name.replace(/ /g,"_")}.xlsx`);
    });
  }

  useEffect(()=>{
    setLoading(true);setMode(null);setEditEntry(null);
    sg(key).then(d=>{setEntries(d||[]);setLoading(false);});
  },[key]);

  async function save(form){
    setSaving(true);
    const entry={...form,id:editEntry?.id||`e${Date.now()}`};
    const next=editEntry?entries.map(e=>e.id===editEntry.id?entry:e):[...entries,entry].sort((a,b)=>(a.date||a.dateStart).localeCompare(b.date||b.dateStart));
    setEntries(next);
    await ss(key,next);
    setSaving(false);setMode(null);setEditEntry(null);
  }
  async function del(id){
    const next=entries.filter(e=>e.id!==id);
    setEntries(next);
    await ss(key,next);
  }

  const work=entries.filter(e=>e.type==="work"||!e.type);
  const abs=entries.filter(e=>e.type==="absence");
  const totalH=work.reduce((s,e)=>s+calcH(e.startTime,e.endTime,e.breakMin),0);
  const totalAbsDays=abs.reduce((s,e)=>s+Number(e.nbDays||1),0);
  const shown=filter==="work"?work:filter==="absence"?abs:entries;

  return(
    <div style={{minHeight:"100vh",background:"#F4F6FA",paddingBottom:"2rem"}}>
      <div style={{background:`linear-gradient(135deg,${NAVYDK},${NAVYLT})`,paddingBottom:"3rem"}}>
        <div style={{padding:"1rem 1.25rem",display:"flex",alignItems:"center",justifyContent:"space-between",maxWidth:460,margin:"0 auto"}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            {employee.photo
              ?<div style={{width:40,height:40,borderRadius:"50%",overflow:"hidden",flexShrink:0,border:"2px solid rgba(255,255,255,0.4)"}}><img src={employee.photo} style={{width:"100%",height:"100%",objectFit:"cover"}}/></div>
              :<Avatar name={employee.name} size={40} bg="rgba(255,255,255,0.2)" color="#fff" fs={14}/>
            }
            <div>
              <div style={{color:"rgba(255,255,255,0.55)",fontSize:11,fontWeight:700,letterSpacing:1}}>BONJOUR</div>
              <div style={{color:"#fff",fontWeight:800,fontSize:17}}>{employee.name}</div>
            </div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>setShowProfile(p=>!p)} style={{background:"rgba(255,255,255,0.12)",border:"1px solid rgba(255,255,255,0.2)",borderRadius:10,padding:"7px 13px",color:"#fff",fontSize:12,cursor:"pointer",fontWeight:600}}>👤 Profil</button>
            <button onClick={onLogout} style={{background:"rgba(255,255,255,0.12)",border:"1px solid rgba(255,255,255,0.2)",borderRadius:10,padding:"7px 13px",color:"#fff",fontSize:12,cursor:"pointer",fontWeight:600}}>Déconnexion</button>
          </div>
        </div>
      </div>

      <div style={{padding:"0 1.25rem",maxWidth:460,margin:"0 auto"}}>
        {/* Carte profil */}
        {showProfile&&(
          <Card style={{marginBottom:"1.25rem",border:`1.5px solid ${NAVY}20`}}>
            <div style={{display:"flex",gap:16,alignItems:"center",marginBottom:"1rem"}}>
              {employee.photo
                ?<div style={{width:72,height:72,borderRadius:"50%",overflow:"hidden",flexShrink:0,border:`3px solid ${NAVY}20`}}><img src={employee.photo} style={{width:"100%",height:"100%",objectFit:"cover"}}/></div>
                :<Avatar name={employee.name} size={72} bg={`${NAVY}15`} color={NAVY} fs={26}/>
              }
              <div>
                <div style={{fontWeight:800,fontSize:17,color:NAVY}}>{employee.name}</div>
                {employee.contractType&&(()=>{const c=ct(employee.contractType);return<span style={{fontSize:12,background:c.bg,color:c.color,borderRadius:6,padding:"2px 10px",fontWeight:700,display:"inline-block",marginTop:4}}>{c.label}</span>;})()}
                {employee.entryDate&&<div style={{fontSize:12,color:"#718096",marginTop:4}}>📅 Entrée : <strong>{fmtDate(employee.entryDate)}</strong></div>}
              </div>
            </div>
            <button onClick={exportMyXLSX} style={{width:"100%",background:`linear-gradient(135deg,${NAVY},${NAVYLT})`,color:"#fff",border:"none",borderRadius:12,padding:"11px",fontSize:13,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
              📥 Exporter mes heures — {fmtYM(ym)}
            </button>
          </Card>
        )}

        <Card style={{marginTop:"-2rem",marginBottom:"1.25rem"}}>
          <div style={{display:"flex",gap:10,marginBottom:"0.75rem"}}>
            {[{v:fmtH(totalH),l:"HEURES",c:NAVY},{v:work.length,l:"JOURS TRAV.",c:MAG},{v:totalAbsDays,l:"JOURS ABS.",c:"#C53030"}].map(({v,l,c})=>(
              <div key={l} style={{flex:1,textAlign:"center",padding:"0.8rem",background:`${c}10`,borderRadius:14}}>
                <div style={{fontSize:19,fontWeight:800,color:c}}>{v}</div>
                <div style={{fontSize:9,color:"#718096",marginTop:2,fontWeight:700,letterSpacing:0.3}}>{l}</div>
              </div>
            ))}
          </div>
          <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:2}}>
            {months.map(m=>(
              <button key={m} onClick={()=>{setYm(m);setFilter("all");}} style={{background:m===ym?NAVY:"transparent",color:m===ym?"#fff":"#718096",border:m===ym?"none":"1.5px solid #E2E8F0",borderRadius:9,padding:"5px 12px",fontSize:12,cursor:"pointer",whiteSpace:"nowrap",fontWeight:700,flexShrink:0}}>{fmtYM(m)}</button>
            ))}
          </div>
        </Card>

        {/* Indicateur sauvegarde */}
        {saving&&<div style={{background:`${NAVY}10`,border:`1px solid ${NAVY}20`,borderRadius:10,padding:"8px 14px",marginBottom:12,display:"flex",alignItems:"center",gap:8,fontSize:13,color:NAVY,fontWeight:600}}>
          <div style={{width:14,height:14,border:`2px solid ${NAVY}30`,borderTop:`2px solid ${NAVY}`,borderRadius:"50%",animation:"spin 0.8s linear infinite",flexShrink:0}}/> Synchronisation Firebase…
          <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
        </div>}

        {!mode&&!editEntry&&(
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:"1.25rem"}}>
            <Btn onClick={()=>setMode("work")}>⏱ Heures</Btn>
            <Btn onClick={()=>setMode("absence")} variant="green">📅 Absence</Btn>
          </div>
        )}

        {mode==="work"&&<WorkForm onSave={save} onCancel={()=>setMode(null)}/>}
        {mode==="absence"&&<AbsForm onSave={save} onCancel={()=>setMode(null)}/>}
        {editEntry&&(editEntry.type==="absence"?<AbsForm initial={editEntry} onSave={save} onCancel={()=>setEditEntry(null)}/>:<WorkForm initial={editEntry} onSave={save} onCancel={()=>setEditEntry(null)}/>)}

        {loading?<Spinner/>:(
          <>
            {entries.length>0&&!mode&&!editEntry&&(
              <div style={{display:"flex",gap:6,marginBottom:14}}>
                {[{v:"all",l:"Tout"},{v:"work",l:`⏱ ${work.length}`},{v:"absence",l:`📅 ${abs.length}`}].map(t=>(
                  <button key={t.v} onClick={()=>setFilter(t.v)} style={{background:t.v===filter?NAVY:"#fff",color:t.v===filter?"#fff":"#718096",border:`1.5px solid ${t.v===filter?NAVY:"#E2E8F0"}`,borderRadius:9,padding:"5px 12px",fontSize:12,cursor:"pointer",fontWeight:700,flexShrink:0}}>{t.l}</button>
                ))}
              </div>
            )}
            {entries.length===0?(
              <div style={{textAlign:"center",padding:"3rem 1rem"}}>
                <div style={{fontSize:52,marginBottom:"1rem"}}>📋</div>
                <p style={{color:"#A0AEC0",fontSize:15,fontWeight:600}}>Aucune entrée pour ce mois</p>
                <p style={{color:"#CBD5E0",fontSize:13}}>Utilisez les boutons ci-dessus pour saisir</p>
              </div>
            ):(
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                {shown.map(entry=>{
                  const isAbs=entry.type==="absence";
                  const typ=isAbs?at(entry.absType):null;
                  const h=isAbs?null:calcH(entry.startTime,entry.endTime,entry.breakMin);
                  const accent=isAbs?typ.color:MAG;
                  return(
                    <div key={entry.id} style={{background:"#fff",borderRadius:16,padding:"1rem 1.25rem",boxShadow:"0 2px 10px rgba(0,0,0,0.05)",borderLeft:`4px solid ${accent}`,display:"flex",alignItems:"center",gap:12}}>
                      {isAbs&&<span style={{fontSize:22,flexShrink:0}}>{typ.icon}</span>}
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2,flexWrap:"wrap"}}>
                          <span style={{fontWeight:800,fontSize:14,color:NAVY}}>{fmtDate(entry.date||entry.dateStart)}</span>
                          {isAbs&&<Badge color={typ.color} bg={typ.bg}>{typ.label}</Badge>}
                        </div>
                        {isAbs?(
                          <div style={{color:"#718096",fontSize:12}}>
                            {entry.halfDay==="half"?"Demi-journée":(entry.dateEnd&&entry.dateEnd!==entry.dateStart?`→ ${fmtDate(entry.dateEnd)}`:"Journée entière")}
                            {entry.note&&<div style={{marginTop:3,color:"#4A5568",fontStyle:"italic"}}>"{entry.note}"</div>}
                          </div>
                        ):(
                          <>
                            <div style={{color:"#718096",fontSize:13}}>{entry.startTime} → {entry.endTime}{Number(entry.breakMin)>0&&<span style={{color:"#A0AEC0"}}> · Pause {entry.breakMin}min</span>}</div>
                            {entry.note&&<div style={{color:"#4A5568",fontSize:12,marginTop:3,background:"#F7F9FC",borderRadius:6,padding:"2px 8px",display:"inline-block"}}>📍 {entry.note}</div>}
                          </>
                        )}
                      </div>
                      <div style={{textAlign:"right",flexShrink:0}}>
                        <div style={{fontWeight:800,fontSize:18,color:accent}}>{isAbs?`${entry.nbDays||1}j`:fmtH(h)}</div>
                        <div style={{display:"flex",gap:5,marginTop:5,justifyContent:"flex-end"}}>
                          <button onClick={()=>{setEditEntry(entry);setMode(null);}} style={{background:`${NAVY}10`,border:"none",borderRadius:7,padding:"4px 9px",fontSize:12,color:NAVY,cursor:"pointer"}}>✏</button>
                          <button onClick={()=>del(entry.id)} style={{background:"#FFF5F5",border:"none",borderRadius:7,padding:"4px 9px",fontSize:12,color:"#C53030",cursor:"pointer"}}>🗑</button>
                        </div>
                      </div>
                    </div>
                  );
                })}
                <div style={{background:`linear-gradient(135deg,${NAVY},${NAVYLT})`,borderRadius:16,padding:"1rem 1.25rem",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div>
                    <div style={{color:"rgba(255,255,255,0.6)",fontSize:11,fontWeight:700,letterSpacing:0.5}}>TOTAL {fmtYM(ym).toUpperCase()}</div>
                    {totalAbsDays>0&&<div style={{color:"rgba(255,255,255,0.45)",fontSize:11,marginTop:2}}>{totalAbsDays} j. absence</div>}
                  </div>
                  <div style={{color:"#fff",fontWeight:800,fontSize:22}}>{fmtH(totalH)}</div>
                </div>
              </div>
            )}
          </>
        )}
      </div>
    </div>
  );
}

// ── LOGIN ADMIN ───────────────────────────────────────────────────────────────
function AdminLogin({onLogin,onBack}){
  const[pass,setPass]=useState("");
  const[err,setErr]=useState("");
  function doLogin(){if(pass===ADMIN_PASS)onLogin();else{setErr("Mot de passe incorrect.");setPass("");}}
  return(

// ── GESTION SALARIÉS ──────────────────────────────────────────────────────────
function EmpManager({employees,onUpdate}){
  const COLS=["#1E3A7B","#E8457A","#2F855A","#B7791F","#6B46C1","#C53030","#2B6CB0","#276749"];
  const emptyForm={name:"",pin:"",contractType:"cdi",entryDate:"",photo:""};
  // IDs stables: préfixe fixe + timestamp à la création uniquement
  const[form,setForm]=useState(emptyForm);
  const[editId,setEditId]=useState(null);
  const[err,setErr]=useState("");
  const[confirmDel,setConfirmDel]=useState(null);
  const[toast,setToast]=useState("");
  const[saving,setSaving]=useState(false);
  const setF=k=>v=>setForm(f=>({...f,[k]:v}));
  function showToast(msg){setToast(msg);setTimeout(()=>setToast(""),2800);}

  function handlePhoto(e){
    const file=e.target.files[0];if(!file)return;
    // Redimensionner à 200×200 max en base64
    const reader=new FileReader();
    reader.onload=ev=>{
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement("canvas");
        const size=Math.min(img.width,img.height);
        const sx=(img.width-size)/2,sy=(img.height-size)/2;
        canvas.width=100;canvas.height=100; // compact pour Google Sheets
        const ctx=canvas.getContext("2d");
        ctx.drawImage(img,sx,sy,size,size,0,0,100,100);
        setF("photo")(canvas.toDataURL("image/jpeg",0.50)); // ~3-5KB max
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(file);
  }

  function validate(){
    if(!form.name.trim())return"Nom obligatoire.";
    if(!/^\d{4}$/.test(form.pin))return"PIN doit faire 4 chiffres.";
    const dup=employees.find(e=>e.pin===form.pin&&e.id!==editId);
    if(dup)return`PIN déjà utilisé par ${dup.name}.`;
    return"";
  }
  async function saveEmp(){
    const e=validate();if(e){setErr(e);return;}
    setSaving(true);
    let next;
    const data={name:form.name.trim(),pin:form.pin,contractType:form.contractType,entryDate:form.entryDate,photo:form.photo};
    // ID stable généré une seule fois à la création
    if(editId){next=employees.map(emp=>emp.id===editId?{...emp,...data}:emp);showToast("✓ Modifié et synchronisé");}
    else{next=[...employees,{id:`emp_${Date.now()}`,...data}];showToast("✓ Ajouté et synchronisé");}
    await ss("fp:employees",next);
    onUpdate(next);setForm(emptyForm);setEditId(null);setErr("");setSaving(false);
  }
  async function delEmp(id){
    // Vérifier si ce salarié a des données avant de supprimer
    const months=monthRange(11);
    let hasData=false;
    for(const m of months){
      const d=await sg(`fp:${id}:${m}`);
      if(d&&d.length>0){hasData=true;break;}
    }
    if(hasData){
      const ok=window.confirm("⚠️ Ce salarié a des heures enregistrées. Supprimer quand même ?\n\nSes données d'heures resteront dans Google Sheets mais ne seront plus accessibles.");
      if(!ok){setConfirmDel(null);return;}
    }
    const next=employees.filter(e=>e.id!==id);
    await ss("fp:employees",next);
    onUpdate(next);setConfirmDel(null);showToast("Supprimé");
  }

  return(
    <div style={{position:"relative"}}>
      {toast&&<div style={{position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",background:NAVY,color:"#fff",borderRadius:12,padding:"10px 22px",fontSize:14,fontWeight:700,zIndex:999,boxShadow:"0 8px 24px rgba(0,0,0,0.2)",whiteSpace:"nowrap"}}>{toast}</div>}
      {confirmDel&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",zIndex:998,display:"flex",alignItems:"center",justifyContent:"center",padding:"1.5rem"}}>
          <div style={{background:"#fff",borderRadius:20,padding:"1.75rem",maxWidth:340,width:"100%"}}>
            <div style={{fontSize:36,textAlign:"center",marginBottom:"1rem"}}>⚠️</div>
            <h3 style={{fontWeight:800,textAlign:"center",margin:"0 0 0.5rem"}}>Supprimer ?</h3>
            <p style={{color:"#718096",fontSize:14,textAlign:"center",margin:"0 0 1.5rem"}}><strong style={{color:NAVY}}>{employees.find(e=>e.id===confirmDel)?.name}</strong> sera supprimé(e).</p>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}><Btn variant="outline" onClick={()=>setConfirmDel(null)}>Annuler</Btn><Btn variant="danger" onClick={()=>delEmp(confirmDel)}>Supprimer</Btn></div>
          </div>
        </div>
      )}

      {/* Formulaire */}
      <Card style={{marginBottom:"1.25rem",border:`2px solid ${editId?MAG+"40":NAVY+"15"}`}}>
        <h3 style={{fontWeight:800,color:editId?MAG:NAVY,fontSize:15,margin:"0 0 1.25rem",display:"flex",alignItems:"center",gap:8}}>
          <span style={{background:editId?`${MAG}15`:`${NAVY}12`,color:editId?MAG:NAVY,width:28,height:28,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0}}>{editId?"✏":"+"}</span>
          {editId?`Modifier — ${employees.find(e=>e.id===editId)?.name}`:"Ajouter un salarié"}
        </h3>

        {/* Photo */}
        <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:16}}>
          <div style={{width:72,height:72,borderRadius:"50%",overflow:"hidden",background:`${NAVY}10`,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",border:`2px dashed ${NAVY}30`}}>
            {form.photo
              ?<img src={form.photo} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
              :<span style={{fontSize:30}}>📷</span>
            }
          </div>
          <div style={{flex:1}}>
            <label style={{display:"block",fontSize:11,fontWeight:700,color:"#4A5568",marginBottom:6,letterSpacing:0.5,textTransform:"uppercase"}}>Photo d'identité</label>
            <label style={{display:"inline-flex",alignItems:"center",gap:8,background:`${NAVY}10`,color:NAVY,borderRadius:10,padding:"7px 14px",fontSize:12,fontWeight:700,cursor:"pointer",border:`1.5px solid ${NAVY}20`}}>
              📁 Choisir une photo
              <input type="file" accept="image/*" onChange={handlePhoto} style={{display:"none"}}/>
            </label>
            {form.photo&&<button onClick={()=>setF("photo")("")} style={{marginLeft:8,background:"#FFF5F5",color:"#C53030",border:"none",borderRadius:8,padding:"7px 10px",fontSize:11,fontWeight:700,cursor:"pointer"}}>✕ Retirer</button>}
          </div>
        </div>

        {/* Nom + PIN */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <Inp label="Nom complet" value={form.name} onChange={e=>{setF("name")(e.target.value);setErr("");}} placeholder="Prénom Nom"/>
          <Inp label="Code PIN (4 chiffres)" type="text" inputMode="numeric" maxLength={4} value={form.pin} onChange={e=>{setF("pin")(e.target.value.replace(/\D/,""));setErr("");}} placeholder="1234" xstyle={{letterSpacing:8,fontWeight:700}}/>
        </div>

        {/* Contrat + Date entrée */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <div style={{marginBottom:14}}>
            <label style={{display:"block",fontSize:11,fontWeight:700,color:"#4A5568",marginBottom:5,letterSpacing:0.5,textTransform:"uppercase"}}>Type de contrat</label>
            <select value={form.contractType} onChange={e=>setF("contractType")(e.target.value)}
              style={{width:"100%",padding:"0.75rem 1rem",borderRadius:10,border:"1.5px solid #E2E8F0",fontSize:14,outline:"none",background:"#fff",color:"#1A202C"}}>
              {CONTRATS.map(c=><option key={c.id} value={c.id}>{c.label}</option>)}
            </select>
          </div>
          <Inp label="Date d'entrée" type="date" value={form.entryDate} onChange={e=>setF("entryDate")(e.target.value)}/>
        </div>

        {err&&<div style={{background:"#FFF5F5",border:"1.5px solid #FEB2B2",borderRadius:10,padding:"0.7rem 1rem",color:"#C53030",fontSize:13,marginBottom:14,fontWeight:600}}>⚠️ {err}</div>}
        <div style={{display:"grid",gridTemplateColumns:editId?"1fr 1fr":"1fr",gap:10}}>
          {editId&&<Btn variant="outline" onClick={()=>{setEditId(null);setForm(emptyForm);setErr("");}}>Annuler</Btn>}

      <Card style={{padding:0,overflow:"hidden"}}>
        <div style={{padding:"1rem 1.5rem",borderBottom:"1px solid #EDF2F7",display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontWeight:800,color:NAVY,fontSize:15}}>Base salariée</span><Badge color={NAVY}>{employees.length} salarié{employees.length>1?"s":""}</Badge></div>
        {employees.length===0
          ?<div style={{textAlign:"center",padding:"3rem",color:"#A0AEC0"}}><div style={{fontSize:40}}>👥</div><p>Aucun salarié</p></div>

            const bg=COLS[i%COLS.length];const isE=editId===emp.id;const contrat=ct(emp.contractType);

function AdminDash({employees:initEmp,onLogout,onEmpChange}){

  function handleUpdate(next){setEmployees(next);onEmpChange(next);}

  // Restauration manuelle depuis Firebase ou localStorage
  async function restoreEmployees(){
    const fromFB = await fg(keyToPath("fp:employees"));
    const fromLocal = lsg("fp:employees");

  }

  // ── Migration : liste tous les docs Firestore et trouve les orphelins ─────
  const[showMigration,setShowMigration]=useState(false);
  const[orphanDocs,setOrphanDocs]=useState([]);
  const[migAssign,setMigAssign]=useState({});
  const[migLoading,setMigLoading]=useState(false);

  async function loadOrphans(){
    // Migration non disponible avec Apps Script — fonctionnalité Firebase uniquement
    setOrphanDocs([]);
    setMigLoading(false);
  }

  async function doMigration(){
    alert("Migration non disponible dans cette version.");
    setShowMigration(false);
  }

  useEffect(()=>{
    if(tab!=="heures")return;
    setLoading(true);setDetailId(null);
    Promise.all(employees.map(emp=>sg(`fp:${emp.id}:${ym}`).then(d=>({id:emp.id,data:d||[]}))))
      .then(res=>{const map={};res.forEach(r=>{map[r.id]=r.data;});setAllData(map);setLoading(false);});
  },[ym,tab,employees]);

  function eWork(id){return(allData[id]||[]).filter(e=>e.type==="work"||!e.type);}
  function eAbs(id){return(allData[id]||[]).filter(e=>e.type==="absence");}
  function eTotH(id){return eWork(id).reduce((s,e)=>s+calcH(e.startTime,e.endTime,e.breakMin),0);}
  function eTotAbs(id){return eAbs(id).reduce((s,e)=>s+Number(e.nbDays||1),0);}

  const grandH=employees.reduce((s,e)=>s+eTotH(e.id),0);
  const grandAbs=employees.reduce((s,e)=>s+eTotAbs(e.id),0);
  const active=employees.filter(e=>(allData[e.id]||[]).length>0).length;

  // ── SAUVEGARDE AUTO ──────────────────────────────────────────────────────────
  const BACKUP_KEY = "fp:last_backup_date";

  async function backupAll(silent=false){
    const backup={version:1,date:new Date().toISOString(),employees,heures:{}};
    // Charger toutes les heures des 12 derniers mois pour chaque salarié
    const months=monthRange(11);
    for(const emp of employees){
      backup.heures[emp.id]={};
      for(const m of months){
        const d=await sg(`fp:${emp.id}:${m}`);
        if(d&&d.length>0) backup.heures[emp.id][m]=d;
      }
    }
    const dateStr=new Date().toISOString().slice(0,10);

    // Envoyer vers Apps Script (Google Sheets) si configuré
    if(GS_READY){
      fetch(SCRIPT_URL,{
        method:"POST",
        headers:{"Content-Type":"text/plain"},
        body:JSON.stringify({secret:SECRET,action:"full_backup",backup}),
        redirect:"follow"
      }).then(()=>console.log("✅ Sauvegarde envoyée à Google Sheets"))
        .catch(e=>console.warn("Sauvegarde Sheets échouée:",e));
    }

    // Télécharger aussi en local (fichier JSON)
    if(!silent){
      const json=JSON.stringify(backup,null,2);
      const a=document.createElement("a");
      a.href=URL.createObjectURL(new Blob([json],{type:"application/json"}));
      a.download=`fermapro_backup_${dateStr}.json`;
      a.click();
      alert(`✅ Sauvegarde complète !\n\n• Fichier JSON téléchargé\n• Envoyée vers Google Sheets${GS_READY?"":" (non configuré)"}\n\nConservez le fichier JSON précieusement.`);
    } else {
      console.log("✅ Sauvegarde automatique effectuée :", dateStr);
    }
    lss(BACKUP_KEY, dateStr);
  }

  // ── SAUVEGARDE AUTO : vérifie au chargement + surveille 22h ──────────────────
  useEffect(()=>{
    const today = new Date().toISOString().slice(0,10);
    const lastBackup = lsg(BACKUP_KEY);

    // Si pas de sauvegarde aujourd'hui ET heure >= 22h → sauvegarder maintenant
    const h = new Date().getHours();
    if(lastBackup !== today && h >= 22){
      console.log("Sauvegarde automatique déclenchée (22h dépassées)");
      setTimeout(()=>backupAll(true), 3000); // attendre 3s que les données chargent
    }

    // Surveiller l'heure toutes les minutes pour déclencher à 22h00 pile
    const timer = setInterval(()=>{
      const now = new Date();
      const todayNow = now.toISOString().slice(0,10);
      const lastB = lsg(BACKUP_KEY);
      if(now.getHours()===22 && now.getMinutes()===0 && lastB !== todayNow){
        console.log("Sauvegarde automatique 22h00");
        backupAll(true);
      }
    }, 60000); // vérifier chaque minute

    return ()=>clearInterval(timer);
  },[employees]);

  // ── LISTE DES SAUVEGARDES FIREBASE ──────────────────────────────────────────
  const[showBackupList,setShowBackupList]=useState(false);
  const[backupList,setBackupList]=useState([]);
  const[backupLoading,setBackupLoading]=useState(false);

  async function loadBackupList(){
    if(!GS_READY){alert("Configurez d'abord l'URL Apps Script.");return;}
    setBackupLoading(true);
    try{
      const url=`${SCRIPT_URL}?secret=${SECRET}&action=get_backups`;
      const r=await fetch(url,{redirect:"follow"});
      const j=await r.json();
      if(j.ok) setBackupList(j.data||[]);
      else alert("Erreur: "+j.error);
    }catch(e){alert("Erreur chargement sauvegardes: "+e.message);}
    setBackupLoading(false);
  }

  async function restoreFromFirebaseBackup(date){
    if(!window.confirm(`Restaurer la sauvegarde du ${date} ?\n\nToutes les données actuelles seront remplacées.`))return;
    try{
      const url=`${SCRIPT_URL}?secret=${SECRET}&action=restore&date=${date}`;
      const r=await fetch(url,{redirect:"follow"});
      const j=await r.json();
      if(!j.ok){alert("❌ Erreur: "+j.error);return;}
      const result=j.data;
      // Recharger les données depuis Apps Script
      const empData=await sg("fp:employees");
      if(empData&&empData.length>0){
        setEmployees(empData);
        onEmpChange(empData);
        lss("fp:employees",empData);
      }
      alert(`✅ Restauration réussie !\n${result.employees} salariés et ${result.months} mois de données restaurés.`);
      setShowBackupList(false);
      setTab("heures");
    }catch(err){alert("❌ Erreur restauration: "+err.message);}
  }

  // ── RESTAURATION DEPUIS JSON LOCAL ────────────────────────────────────────────
  async function restoreFromBackup(e){
    const file=e.target.files[0];
    if(!file)return;
    const text=await file.text();
    try{
      const backup=JSON.parse(text);
      if(!backup.employees||!backup.heures) throw new Error("Format invalide");
      // Restaurer les salariés
      await ss("fp:employees",backup.employees);
      setEmployees(backup.employees);
      onEmpChange(backup.employees);
      // Restaurer toutes les heures
      let count=0;
      for(const empId of Object.keys(backup.heures)){
        for(const m of Object.keys(backup.heures[empId])){
          await ss(`fp:${empId}:${m}`,backup.heures[empId][m]);
          count++;
        }
      }
      alert(`✅ Restauration réussie !\n${backup.employees.length} salariés et ${count} mois de données restaurés.\n\nDate de la sauvegarde : ${backup.date?.slice(0,10)||"inconnue"}`);
    }catch(err){
      alert("❌ Fichier invalide : "+err.message);
    }
    e.target.value="";
  }

  function exportCSV(){
    // ── Utilitaires ──────────────────────────────────────────────────────────
    function getMondayOf(dateStr){
      const d=new Date(dateStr);const day=d.getDay();
      const diff=day===0?-6:1-day;
      const mon=new Date(d);mon.setDate(d.getDate()+diff);
      return mon.toISOString().slice(0,10);
    }
    function getWeekNum(d){
      const date=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
      const dayNum=date.getUTCDay()||7;date.setUTCDate(date.getUTCDate()+4-dayNum);
      const yearStart=new Date(Date.UTC(date.getUTCFullYear(),0,1));
      return Math.ceil((((date-yearStart)/86400000)+1)/7);
    }
    function fmtWeek(mondayStr){
      const[y,m,d]=mondayStr.split("-");
      const mon=new Date(Number(y),Number(m)-1,Number(d));
      const sun=new Date(mon);sun.setDate(mon.getDate()+6);
      const dd=n=>String(n).padStart(2,"0");
      return`S${getWeekNum(mon)} — ${dd(mon.getDate())}/${dd(mon.getMonth()+1)} au ${dd(sun.getDate())}/${dd(sun.getMonth()+1)}/${sun.getFullYear()}`;
    }
    function fmtHlabel(h){
      const hh=Math.floor(Math.abs(h)),mm=Math.round((Math.abs(h)-hh)*60);
      return`${h<0?"-":""}${hh}h${String(mm).padStart(2,"0")}`;
    }

    // ── ONGLET 1 : Synthèse hebdomadaire ─────────────────────────────────────
    const byEmpWeek={};
    employees.forEach(emp=>{byEmpWeek[emp.id]={};});
    employees.forEach(emp=>{
      (allData[emp.id]||[]).forEach(e=>{
        if(e.type==="absence"){
          let cur=new Date(e.dateStart);const end=new Date(e.dateEnd||e.dateStart);
          while(cur<=end){
            const ds=cur.toISOString().slice(0,10);const mon=getMondayOf(ds);
            if(!byEmpWeek[emp.id][mon])byEmpWeek[emp.id][mon]={heures:0,absJours:0,absDetail:[]};
            byEmpWeek[emp.id][mon].absJours+=e.halfDay==="half"?0.5:1;
            byEmpWeek[emp.id][mon].absDetail.push(at(e.absType).label);
            cur.setDate(cur.getDate()+1);
          }
        } else {
          const mon=getMondayOf(e.date);
          if(!byEmpWeek[emp.id][mon])byEmpWeek[emp.id][mon]={heures:0,absJours:0,absDetail:[]};
          byEmpWeek[emp.id][mon].heures+=calcH(e.startTime,e.endTime,e.breakMin);
        }
      });
    });
    const allMondays=[...new Set(employees.flatMap(emp=>Object.keys(byEmpWeek[emp.id])))].sort();

    const sheet1=[
      [`RAPPORT HEBDOMADAIRE — ${fmtYM(ym).toUpperCase()}   |   Base : 35h/semaine`,"","","","","","",""],
      [""],
      ["Salarié","Semaine","Heures travaillées","Jours absence","Type(s) absence","Heures requises (35h)","Différence","Statut"],
    ];
    employees.forEach(emp=>{
      const weeks=byEmpWeek[emp.id];
      const weekKeys=allMondays.filter(m=>weeks[m]);
      if(weekKeys.length===0){
        sheet1.push([emp.name,"(aucune saisie)","0h00","","","35h00","-35h00","⚠ Manquant"]);
        return;
      }
      let totH=0,totReq=0,totDiff=0;
      weekKeys.forEach(mon=>{
        const w=weeks[mon];const h=w.heures;const absJ=w.absJours;
        const req=Math.max(0,35-(absJ*7));const diff=h-req;
        totH+=h;totReq+=req;totDiff+=diff;
        sheet1.push([
          emp.name,fmtWeek(mon),fmtHlabel(h),
          absJ>0?`${absJ}j`:"",
          [...new Set(w.absDetail)].join(", ")||"",
          fmtHlabel(req),fmtHlabel(diff),
          diff>0?"✓ Excédent":diff===0?"✓ Exact":"⚠ Déficit"
        ]);
      });
      sheet1.push([emp.name,`TOTAL ${fmtYM(ym).toUpperCase()}`,fmtHlabel(totH),"","",fmtHlabel(totReq),fmtHlabel(totDiff),totDiff>=0?"✓ Excédent":"⚠ Déficit"]);
      sheet1.push([""]); // séparateur entre salariés
    });

    // ── ONGLET 2 : Détail journalier ─────────────────────────────────────────
    const sheet2=[
      [`DÉTAIL JOURNALIER — ${fmtYM(ym).toUpperCase()}`,"","","","","",""],
      [""],
      ["Salarié","Date","Jour","Type","Heure début","Heure fin","Pause (min)","Heures effectives","Chantier / Note","Détail absence","Jours absence"],
    ];
    employees.forEach(emp=>{
      const entries=(allData[emp.id]||[]).slice().sort((a,b)=>(a.date||a.dateStart).localeCompare(b.date||b.dateStart));
      if(entries.length===0){
        sheet2.push([emp.name,"(aucune saisie)","","","","","","","","",""]);
        return;
      }
      entries.forEach(e=>{
        const isAbs=e.type==="absence";
        const dateStr=e.date||e.dateStart;
        const[y,m,d]=dateStr.split("-");
        const dt=new Date(Number(y),Number(m)-1,Number(d));
        const jourLabel=DAYS_FR[dt.getDay()];
        if(isAbs){
          const typ=at(e.absType);
          const dateRange=e.dateEnd&&e.dateEnd!==e.dateStart?`${fmtDate(e.dateStart)} → ${fmtDate(e.dateEnd)}`:fmtDate(e.dateStart);
          sheet2.push([
            emp.name,dateRange,jourLabel,"Absence","","","","",
            e.note||"",typ.label,
            e.halfDay==="half"?"0.5":String(e.nbDays||1)
          ]);
        } else {
          const h=calcH(e.startTime,e.endTime,e.breakMin);
          sheet2.push([
            emp.name,fmtDate(dateStr),jourLabel,"Travail",
            e.startTime,e.endTime,e.breakMin||"0",
            fmtHlabel(h),e.note||"","",""
          ]);
        }
      });
      // Sous-total par salarié
      const totalH=(allData[emp.id]||[]).filter(e=>e.type==="work"||!e.type).reduce((s,e)=>s+calcH(e.startTime,e.endTime,e.breakMin),0);
      const totalAbs=(allData[emp.id]||[]).filter(e=>e.type==="absence").reduce((s,e)=>s+Number(e.nbDays||1),0);
      sheet2.push([emp.name,`TOTAL ${emp.name.toUpperCase()}`,""," ","","","",fmtHlabel(totalH),"","",totalAbs>0?`${totalAbs}j`:""]);
      sheet2.push([""]);
    });

    // ── Génération XLSX 2 onglets ─────────────────────────────────────────────
    const wb=XLSX.utils.book_new();
    const ws1=XLSX.utils.aoa_to_sheet(sheet1);
    const ws2=XLSX.utils.aoa_to_sheet(sheet2);

    // Largeurs colonnes onglet 1
    ws1["!cols"]=[{wch:22},{wch:36},{wch:20},{wch:14},{wch:28},{wch:22},{wch:14},{wch:14}];
    // Largeurs colonnes onglet 2
    ws2["!cols"]=[{wch:22},{wch:32},{wch:8},{wch:10},{wch:12},{wch:12},{wch:12},{wch:18},{wch:28},{wch:22},{wch:14}];

    XLSX.utils.book_append_sheet(wb,ws1,"Synthèse hebdo");
    XLSX.utils.book_append_sheet(wb,ws2,"Détail journalier");
    XLSX.writeFile(wb,`fermapro_${ym}.xlsx`);
  }

  const dEmp=detailId?employees.find(e=>e.id===detailId):null;
  const dAll=detailId?(allData[detailId]||[]):[];
  const dWork=dAll.filter(e=>e.type==="work"||!e.type);
  const dAbs=dAll.filter(e=>e.type==="absence");
  const dH=detailId?eTotH(detailId):0;
  const dAbsDays=detailId?eTotAbs(detailId):0;
  const dShown=detailTab==="work"?dWork:detailTab==="absence"?dAbs:dAll;
  const TABS=[{id:"heures",icon:"📊",label:"Heures & Absences"},{id:"salaries",icon:"👥",label:"Salariés"}];

  return(
    <div style={{minHeight:"100vh",background:"#F4F6FA"}}>
      {/* ── Modal Historique Sauvegardes ────────────────────────────────── */}
      {showBackupList&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",padding:"1rem"}}>
          <div style={{background:"#fff",borderRadius:20,padding:"1.5rem",width:"100%",maxWidth:520,maxHeight:"80vh",overflowY:"auto",boxShadow:"0 24px 64px rgba(0,0,0,0.4)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1rem"}}>
              <h3 style={{margin:0,color:NAVY,fontSize:18,fontWeight:800}}>🕐 Sauvegardes automatiques</h3>
              <button onClick={()=>setShowBackupList(false)} style={{background:"#FFF5F5",border:"none",borderRadius:8,padding:"6px 12px",color:"#C53030",cursor:"pointer",fontWeight:700}}>✕</button>
            </div>
            <p style={{color:"#718096",fontSize:13,marginBottom:"1rem"}}>Sauvegardes stockées dans Firebase — 60 derniers jours conservés.</p>
            {backupLoading?<div style={{textAlign:"center",padding:"2rem",color:"#718096"}}>Chargement…</div>:
            backupList.length===0?<div style={{textAlign:"center",padding:"2rem",color:"#A0AEC0"}}>Aucune sauvegarde trouvée.<br/><small>La première sera créée ce soir à 22h.</small></div>:(
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {backupList.map(b=>(
                  <div key={b.name} style={{background:"#F7F9FC",borderRadius:12,padding:"0.75rem 1rem",display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}}>
                    <div>
                      <div style={{fontWeight:700,fontSize:14,color:NAVY}}>📅 {b.date}</div>
                      <div style={{fontSize:11,color:"#A0AEC0",marginTop:2}}>Sauvegarde automatique 22h00</div>
                    </div>
                    <button onClick={()=>restoreFromFirebaseBackup(b.date)}
                      style={{background:`${NAVY}10`,border:`1px solid ${NAVY}20`,borderRadius:9,padding:"6px 14px",fontSize:12,color:NAVY,cursor:"pointer",fontWeight:700,flexShrink:0}}>
                      ↩ Restaurer
                    </button>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      )}

      {/* ── Modal Migration ─────────────────────────────────────── */}
      {showMigration&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.6)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",padding:"1rem"}}>
          <div style={{background:"#fff",borderRadius:20,padding:"1.5rem",width:"100%",maxWidth:600,maxHeight:"80vh",overflowY:"auto",boxShadow:"0 24px 64px rgba(0,0,0,0.4)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1rem"}}>
              <h3 style={{margin:0,color:NAVY,fontSize:18,fontWeight:800}}>🔀 Migration des heures</h3>
              <button onClick={()=>setShowMigration(false)} style={{background:"#FFF5F5",border:"none",borderRadius:8,padding:"6px 12px",color:"#C53030",cursor:"pointer",fontWeight:700}}>✕ Fermer</button>
            </div>
            {migLoading?<div style={{textAlign:"center",padding:"2rem",color:"#718096"}}>Chargement des documents…</div>:
            orphanDocs.length===0?<div style={{textAlign:"center",padding:"2rem",color:"#48BB78",fontWeight:700}}>✅ Aucun document orphelin trouvé.</div>:(
              <>
                <p style={{color:"#718096",fontSize:13,marginBottom:"1rem"}}>Ces documents d'heures n'appartiennent à aucun salarié actuel. Assignez-les au bon salarié :</p>
                {orphanDocs.map(doc=>(
                  <div key={doc.docName} style={{background:"#F7F9FC",borderRadius:12,padding:"0.75rem 1rem",marginBottom:8,display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700,fontSize:13,color:NAVY}}>{doc.ym} — {doc.count} entrée(s)</div>
                      <div style={{fontSize:11,color:"#A0AEC0",fontFamily:"monospace"}}>{doc.empId}</div>
                    </div>
                    <select value={migAssign[doc.docName]||""} onChange={e=>setMigAssign(p=>({...p,[doc.docName]:e.target.value}))}
                      style={{borderRadius:8,border:"1.5px solid #E2E8F0",padding:"6px 10px",fontSize:13,color:NAVY,fontWeight:600}}>
                      <option value="">— Choisir un salarié —</option>
                      {employees.map(emp=><option key={emp.id} value={emp.id}>{emp.name}</option>)}
                    </select>
                  </div>
                ))}
                <button onClick={doMigration} style={{width:"100%",marginTop:"1rem",background:`linear-gradient(135deg,${NAVY},${NAVYLT})`,color:"#fff",border:"none",borderRadius:12,padding:"12px",fontSize:14,fontWeight:700,cursor:"pointer"}}>
                  🔀 Migrer les documents sélectionnés
                </button>
              </>
            )}
          </div>
        </div>
      )}
      <div style={{background:`linear-gradient(135deg,${NAVYDK},${NAVYLT})`,padding:"1.25rem 1.5rem 0"}}>
        <div style={{maxWidth:900,margin:"0 auto"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"1.25rem"}}>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <div style={{width:38,height:38,borderRadius:11,background:"rgba(255,255,255,0.15)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>📊</div>
              <div><div style={{color:"rgba(255,255,255,0.5)",fontSize:11,fontWeight:700,letterSpacing:1.2}}>FERMAPRO · BACK OFFICE</div><div style={{color:"#fff",fontWeight:800,fontSize:18}}>Administration</div></div>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>backupAll(false)} style={{background:"rgba(72,187,120,0.25)",border:"1px solid rgba(72,187,120,0.4)",borderRadius:10,padding:"7px 14px",color:"#9AE6B4",fontSize:12,cursor:"pointer",fontWeight:700}}>
                💾 Sauvegarder
                {lsg(BACKUP_KEY)&&<span style={{display:"block",fontSize:9,color:"rgba(154,230,180,0.7)",marginTop:1}}>Dernière : {lsg(BACKUP_KEY)}</span>}
              </button>
              <button onClick={()=>{setShowBackupList(true);loadBackupList();}} style={{background:"rgba(255,200,0,0.25)",border:"1px solid rgba(255,200,0,0.4)",borderRadius:10,padding:"7px 14px",color:"#FFE066",fontSize:12,cursor:"pointer",fontWeight:700}}>🕐 Historique</button>
              <label style={{background:"rgba(200,150,255,0.25)",border:"1px solid rgba(200,150,255,0.4)",borderRadius:10,padding:"7px 14px",color:"#D6BCFA",fontSize:12,cursor:"pointer",fontWeight:700}}>
                📂 Restaurer fichier
                <input type="file" accept=".json" onChange={restoreFromBackup} style={{display:"none"}}/>
              </label>
              <button onClick={onLogout} style={{background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.2)",borderRadius:10,padding:"7px 14px",color:"#fff",fontSize:12,cursor:"pointer",fontWeight:600}}>Déconnexion</button></div>
          </div>
          <div style={{display:"flex",gap:4}}>
            {TABS.map(t=>(
              <button key={t.id} onClick={()=>setTab(t.id)} style={{background:tab===t.id?"#fff":"rgba(255,255,255,0.08)",color:tab===t.id?NAVY:"rgba(255,255,255,0.65)",border:"none",borderRadius:"10px 10px 0 0",padding:"10px 20px",fontSize:13,fontWeight:800,cursor:"pointer",display:"flex",alignItems:"center",gap:7}}>
                <span>{t.icon}</span>{t.label}
                {t.id==="salaries"&&<span style={{background:tab===t.id?`${MAG}20`:"rgba(255,255,255,0.15)",color:tab===t.id?MAG:"rgba(255,255,255,0.7)",borderRadius:5,padding:"1px 7px",fontSize:11,fontWeight:800}}>{employees.length}</span>}
              </button>
            ))}
          </div>
        </div>
      </div>

      <div style={{padding:"1.5rem",maxWidth:900,margin:"0 auto"}}>
        {tab==="salaries"?<EmpManager employees={employees} onUpdate={handleUpdate}/>:(
          <>
            <div style={{display:"flex",gap:10,marginBottom:"1.5rem",flexWrap:"wrap",alignItems:"center"}}>
              <select value={ym} onChange={e=>setYm(e.target.value)} style={{padding:"9px 14px",borderRadius:10,border:"1.5px solid #E2E8F0",fontSize:14,fontWeight:700,color:NAVY,background:"#fff",cursor:"pointer",outline:"none"}}>{months.map(m=><option key={m} value={m}>{fmtYM(m)}</option>)}</select>
              <button onClick={exportCSV} style={{background:NAVY,color:"#fff",border:"none",borderRadius:10,padding:"9px 18px",fontSize:13,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",gap:8}}>📥 Exporter Excel</button>
              {detailId&&<button onClick={()=>{setDetailId(null);setDetailTab("all");}} style={{background:`${MAG}12`,color:MAG,border:`1.5px solid ${MAG}30`,borderRadius:10,padding:"9px 14px",fontSize:13,fontWeight:700,cursor:"pointer"}}>← Retour</button>}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:"1.5rem"}}>
              {[{v:fmtH(grandH),l:"Total heures",c:NAVY},{v:`${grandAbs}j`,l:"Total absences",c:"#C53030"},{v:active,l:"Salariés actifs",c:MAG}].map(({v,l,c})=>(
                <div key={l} style={{background:"#fff",borderRadius:16,padding:"1.1rem",textAlign:"center",boxShadow:"0 2px 10px rgba(0,0,0,0.06)",borderTop:`3px solid ${c}`}}>
                  <div style={{fontSize:24,fontWeight:800,color:c}}>{v}</div>
                  <div style={{fontSize:11,color:"#718096",marginTop:4,fontWeight:700,letterSpacing:0.4}}>{l.toUpperCase()}</div>
                </div>
              ))}
            </div>

            {loading?<Spinner/>:!detailId?(
              <Card style={{padding:0,overflow:"hidden"}}>
                <div style={{padding:"1.1rem 1.5rem",borderBottom:"1px solid #EDF2F7",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontWeight:800,color:NAVY,fontSize:15}}>Synthèse — {fmtYM(ym)}</span>
                  <Badge color={NAVY}>{employees.length} salariés</Badge>
                </div>
                {employees.map((emp,i)=>{
                  const th=eTotH(emp.id),ta=eTotAbs(emp.id),pct=grandH>0?(th/grandH)*100:0;
                  return(
                    <div key={emp.id} onClick={()=>setDetailId(emp.id)} style={{padding:"1rem 1.5rem",borderBottom:i<employees.length-1?"1px solid #EDF2F7":"none",display:"flex",alignItems:"center",gap:14,cursor:"pointer"}} onMouseEnter={e=>e.currentTarget.style.background="#F7FAFC"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                      <Avatar name={emp.name} size={42}/>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontWeight:700,color:"#1A202C",fontSize:15,marginBottom:5}}>{emp.name}</div>
                        <div style={{height:4,background:"#EDF2F7",borderRadius:5,overflow:"hidden",marginBottom:6}}><div style={{width:`${pct}%`,height:"100%",background:`linear-gradient(90deg,${MAG},${MAGLT})`,borderRadius:5}}/></div>
                        {ta>0&&<div style={{display:"flex",gap:5,flexWrap:"wrap"}}>{ABS.filter(a=>eAbs(emp.id).some(e=>e.absType===a.id)).map(a=>{const n=eAbs(emp.id).filter(e=>e.absType===a.id).reduce((s,e)=>s+Number(e.nbDays||1),0);return<span key={a.id} style={{fontSize:11,background:a.bg,color:a.color,borderRadius:5,padding:"1px 7px",fontWeight:700}}>{a.icon} {n}j</span>;})}</div>}
                      </div>
                      <div style={{textAlign:"right",minWidth:90}}>
                        <div style={{fontWeight:800,fontSize:17,color:th>0?MAG:"#CBD5E0"}}>{fmtH(th)}</div>
                        {ta>0&&<div style={{fontSize:12,color:"#C53030",fontWeight:700,marginTop:2}}>{ta}j abs.</div>}
                        <div style={{fontSize:11,color:"#A0AEC0"}}>{eWork(emp.id).length}j trav.</div>
                      </div>
                      <span style={{color:"#CBD5E0",fontSize:20}}>›</span>
                    </div>
                  );
                })}
                <div style={{padding:"1rem 1.5rem",background:`linear-gradient(135deg,${NAVY}08,${MAG}05)`,borderTop:"2px solid #EDF2F7",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div><div style={{fontWeight:800,color:NAVY,fontSize:14}}>TOTAL ENTREPRISE</div>{grandAbs>0&&<div style={{fontSize:12,color:"#C53030",fontWeight:700}}>{grandAbs} j. absence</div>}</div>
                  <span style={{fontWeight:800,color:NAVY,fontSize:20}}>{fmtH(grandH)}</span>
                </div>
              </Card>
            ):(
              <Card style={{padding:0,overflow:"hidden"}}>
                <div style={{padding:"1.25rem 1.5rem",background:`linear-gradient(135deg,${NAVY}08,${MAG}05)`,borderBottom:"1px solid #EDF2F7"}}>
                  <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:dAbs.length>0?12:0}}>
                    <Avatar name={dEmp.name} size={48}/>
                    <div style={{flex:1}}><div style={{fontWeight:800,color:NAVY,fontSize:17}}>{dEmp.name}</div><div style={{color:"#718096",fontSize:13}}>{fmtYM(ym)}</div></div>
                    <div style={{textAlign:"right"}}><div style={{fontWeight:800,fontSize:22,color:MAG}}>{fmtH(dH)}</div>{dAbsDays>0&&<div style={{fontSize:13,color:"#C53030",fontWeight:700}}>{dAbsDays}j absence</div>}</div>
                  </div>
                  {dAbs.length>0&&<div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{ABS.filter(a=>dAbs.some(e=>e.absType===a.id)).map(a=>{const n=dAbs.filter(e=>e.absType===a.id).reduce((s,e)=>s+Number(e.nbDays||1),0);return<span key={a.id} style={{fontSize:12,background:a.bg,color:a.color,borderRadius:8,padding:"4px 10px",fontWeight:700,border:`1px solid ${a.color}30`}}>{a.icon} {a.label} · {n}j</span>;})}</div>}
                </div>
                <div style={{padding:"0.75rem 1.5rem",borderBottom:"1px solid #EDF2F7",display:"flex",gap:8,flexWrap:"wrap"}}>
                  {[{v:"all",l:"Tout"},{v:"work",l:`⏱ Heures (${dWork.length})`},{v:"absence",l:`📅 Absences (${dAbs.length})`}].map(t=>(
                    <button key={t.v} onClick={()=>setDetailTab(t.v)} style={{background:detailTab===t.v?NAVY:"transparent",color:detailTab===t.v?"#fff":"#718096",border:`1.5px solid ${detailTab===t.v?NAVY:"#E2E8F0"}`,borderRadius:8,padding:"4px 12px",fontSize:12,cursor:"pointer",fontWeight:700}}>{t.l}</button>
                  ))}
                </div>
                {dShown.length===0?<div style={{textAlign:"center",padding:"3rem",color:"#A0AEC0"}}><div style={{fontSize:40}}>📭</div><p>Aucune entrée</p></div>:(
                  <>
                    <div style={{padding:"0.6rem 1.5rem",background:"#F7F9FC",borderBottom:"1px solid #EDF2F7",display:"grid",gridTemplateColumns:"1.2fr 1fr 1.5fr 80px",gap:8}}>
                      {["Date","Type","Détail","Durée"].map(h=><div key={h} style={{fontSize:11,fontWeight:700,color:"#A0AEC0",letterSpacing:0.5}}>{h.toUpperCase()}</div>)}
                    </div>
                    {dShown.map((entry,i)=>{
                      const isAbs=entry.type==="absence";const typ=isAbs?at(entry.absType):null;const h=isAbs?null:calcH(entry.startTime,entry.endTime,entry.breakMin);
                      return(
                        <div key={entry.id} style={{padding:"0.9rem 1.5rem",borderBottom:i<dShown.length-1?"1px solid #EDF2F7":"none",display:"grid",gridTemplateColumns:"1.2fr 1fr 1.5fr 80px",gap:8,alignItems:"center"}} onMouseEnter={e=>e.currentTarget.style.background="#F7FAFC"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                          <div style={{fontWeight:700,fontSize:13,color:"#1A202C"}}>{fmtDate(entry.date||entry.dateStart)}</div>
                          {isAbs?<Badge color={typ.color} bg={typ.bg}>{typ.icon} {typ.label}</Badge>:<span style={{fontSize:12,background:`${MAG}12`,color:MAG,borderRadius:6,padding:"2px 8px",fontWeight:700,display:"inline-block"}}>⏱ Travail</span>}
                          <div style={{fontSize:12,color:"#718096"}}>
                            {isAbs?<>{entry.halfDay==="half"?"½ journée":(entry.dateEnd&&entry.dateEnd!==entry.dateStart?`→ ${fmtDate(entry.dateEnd)}`:"")}{entry.note&&<div style={{fontStyle:"italic",color:"#A0AEC0",marginTop:1,fontSize:11}}>"{entry.note}"</div>}</>
                            :<>{entry.startTime}–{entry.endTime}{Number(entry.breakMin)>0&&<span style={{color:"#CBD5E0"}}> p.{entry.breakMin}min</span>}{entry.note&&<div style={{fontStyle:"italic",color:"#A0AEC0",marginTop:1,fontSize:11}}>{entry.note}</div>}</>}
                          </div>
                          <div style={{fontWeight:800,fontSize:15,color:isAbs?typ.color:MAG,textAlign:"right"}}>{isAbs?`${entry.nbDays||1}j`:fmtH(h)}</div>
                        </div>
                      );
                    })}
                    <div style={{padding:"1rem 1.5rem",background:`${NAVY}05`,borderTop:`2px solid ${NAVY}15`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div style={{display:"flex",gap:18}}>
                        <div><span style={{fontWeight:600,color:"#718096",fontSize:12}}>Heures : </span><span style={{fontWeight:800,color:MAG,fontSize:15}}>{fmtH(dH)}</span></div>
                        {dAbsDays>0&&<div><span style={{fontWeight:600,color:"#718096",fontSize:12}}>Absences : </span><span style={{fontWeight:800,color:"#C53030",fontSize:15}}>{dAbsDays}j</span></div>}
                      </div>
                      <span style={{fontSize:12,color:"#A0AEC0",fontWeight:600}}>{dAll.length} entrée{dAll.length>1?"s":""}</span>
                    </div>
                  </>
                )}
              </Card>
            )}
          </>
        )}
      </div>
    </div>
  );
}

// ── ROOT ──────────────────────────────────────────────────────────────────────
function App(){
  const[view,setView]=useState("loading");
  const[employee,setEmployee]=useState(null);
  const[employees,setEmployees]=useState([]);

  useEffect(()=>{
    sg("fp:employees").then(data=>{
      if(data&&data.length>0){
        // ✅ Données trouvées → on les utilise, on ne touche à rien
        setEmployees(data);
        lss("fp:employees", data); // cache local
      } else {
        // Rien dans Firebase ni en local → écrire les salariés par défaut UNE SEULE FOIS
        setEmployees(INIT_EMP);
        ss("fp:employees", INIT_EMP);
      }
      setView("landing");
    }).catch(()=>{
      // Erreur réseau → utiliser cache local ou défauts
      const local = lsg("fp:employees");
      setEmployees(local&&local.length>0 ? local : INIT_EMP);
      setView("landing");
    });
  },[]);

  const go=v=>setView(v);

  if(view==="loading") return(
    <div style={{minHeight:"100vh",background:`linear-gradient(155deg,${NAVYDK},${NAVYLT})`,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:20}}>
      <div style={{width:60,height:60,borderRadius:20,background:MAG,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:`0 12px 40px ${MAG}60`}}>
        <svg width="34" height="34" viewBox="0 0 42 42" fill="none"><path d="M13 21.5l5 5 11-11" stroke="#fff" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
      </div>
      <div style={{width:36,height:36,border:"3px solid rgba(255,255,255,0.2)",borderTop:"3px solid #fff",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
      <p style={{color:"rgba(255,255,255,0.5)",fontSize:13,margin:0}}>Connexion Firebase…</p>
    </div>
  );

  if(view==="setup")     return<FirebaseSetup/>;
  if(view==="landing")   return<Landing onEmployee={()=>go("empLogin")} onAdmin={()=>go("adminLogin")} fbReady={FB_READY}/>;
  if(view==="empLogin")  return<EmpLogin employees={employees} onLogin={e=>{setEmployee(e);go("empDash");}} onBack={()=>go("landing")}/>;
  if(view==="empDash")   return<EmpDash employee={employee} onLogout={()=>{setEmployee(null);go("landing");}}/>;
  if(view==="adminLogin")return<AdminLogin onLogin={()=>go("adminDash")} onBack={()=>go("landing")}/>;
  if(view==="adminDash") return<AdminDash employees={employees} onLogout={()=>go("landing")} onEmpChange={setEmployees}/>;
  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
